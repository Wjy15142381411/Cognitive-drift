<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="screen-orientation" content="landscape">
    <title>"%&* Library </title>	
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #0a0a12;
        }
        canvas { display: block; }
        
        /* 强制横屏 - 竖屏时旋转body */
        @media screen and (orientation: portrait) {
            body {
                position: fixed;
                top: 0;
                left: 100vw;
                width: 100vh;
                height: 100vw;
                transform: rotate(90deg);
                transform-origin: top left;
            }
        }
        
        #info {
            position: fixed;
            bottom: 12px;
            left: 12px;
            background: rgba(0,0,0,0.65);
            color: #0f0;
            font-family: monospace;
            font-size: 13px;
            padding: 4px 10px;
            border-radius: 8px;
            pointer-events: none;
            z-index: 999;
            backdrop-filter: blur(4px);
        }
        /* 开屏动画相关样式 */
        #openingCanvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            cursor: pointer;
            z-index: 1000;
        }
        .transition-page {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: black;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.8s ease, visibility 0s 0.8s;
            z-index: 999;
            pointer-events: none;
        }
        .transition-page.active {
            opacity: 1;
            visibility: visible;
            transition: opacity 0.8s ease, visibility 0s 0s;
            pointer-events: auto;
        }
        .transition-content {
            text-align: center;
            color: white;
            font-family: 'Courier New', monospace;
            transform: scale(0.9);
            animation: fadeScale 1s ease forwards;
        }
        @keyframes fadeScale {
            0% {
                opacity: 0;
                transform: scale(0.8);
            }
            100% {
                opacity: 1;
                transform: scale(1);
            }
        }
        .transition-content h1 {
            font-size: 4rem;
            letter-spacing: 8px;
            text-shadow: 0 0 20px cyan, 0 0 40px blue;
            margin-bottom: 20px;
        }
        .transition-content p {
            font-size: 1.5rem;
            color: #ccc;
        }
        /* glitch 动画集 */
        @keyframes glitchFlash {
            0% { filter: brightness(1); }
            20% { filter: brightness(3) invert(1); background: white; }
            40% { filter: brightness(0.3) invert(0); }
            60% { filter: brightness(2) invert(1); }
            100% { filter: brightness(1); }
        }
        @keyframes glitchTriple {
            0% { filter: invert(0); }
            20% { filter: invert(1); background: red; }
            40% { filter: invert(0); background: white; }
            60% { filter: invert(1); }
            100% { filter: invert(0); }
        }
        @keyframes glitchRGB {
            0% { filter: drop-shadow(0px 0px 0px red) drop-shadow(0px 0px 0px blue); }
            20% { filter: drop-shadow(-8px 0px 0px red) drop-shadow(8px 0px 0px blue); }
            40% { filter: drop-shadow(-15px 0px 0px red) drop-shadow(15px 0px 0px blue); }
            60% { filter: drop-shadow(-8px 0px 0px red) drop-shadow(8px 0px 0px blue); }
            100% { filter: drop-shadow(0px 0px 0px red) drop-shadow(0px 0px 0px blue); }
        }
        @keyframes glitchTear {
            0% { transform: skewX(0deg); }
            20% { transform: skewX(5deg); }
            40% { transform: skewX(-5deg); }
            60% { transform: skewX(3deg); }
            100% { transform: skewX(0deg); }
        }
        @keyframes glitchShake {
            0%, 100% { transform: translate(0, 0); }
            10% { transform: translate(-5px, -3px); }
            20% { transform: translate(4px, 2px); }
            30% { transform: translate(-3px, 4px); }
            40% { transform: translate(2px, -5px); }
            50% { transform: translate(-4px, 3px); }
            60% { transform: translate(5px, -2px); }
            70% { transform: translate(-2px, 5px); }
            80% { transform: translate(3px, -4px); }
            90% { transform: translate(-1px, 1px); }
        }
        @keyframes glitchZoom {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        @keyframes glitchRainbow {
            0% { filter: hue-rotate(0deg); }
            25% { filter: hue-rotate(90deg); }
            50% { filter: hue-rotate(180deg); }
            75% { filter: hue-rotate(270deg); }
            100% { filter: hue-rotate(360deg); }
        }
        @keyframes glitchScanline {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(100%); }
        }
        @keyframes glitchColorBands {
            0% { filter: contrast(1) sepia(0); }
            25% { filter: contrast(2) sepia(0.5); }
            50% { filter: contrast(1.5) sepia(0.8); }
            75% { filter: contrast(2.5) sepia(0.3); }
            100% { filter: contrast(1) sepia(0); }
        }
        .glitch-invert { filter: invert(1); transition: filter 0.05s linear; }
        .glitch-pixelate { image-rendering: crisp-edges; image-rendering: pixelated; transform: scale(0.5); transform-origin: center; transition: transform 0.05s linear; }
        .glitch-wave { filter: hue-rotate(180deg) contrast(2); }
        .glitch-flash { animation: glitchFlash 0.3s infinite; }
        .glitch-triple { animation: glitchTriple 0.2s infinite; }
        .glitch-rgb { animation: glitchRGB 0.1s infinite; }
        .glitch-tear { animation: glitchTear 0.05s infinite; }
        .glitch-flip { transform: scaleY(-1); transition: transform 0.05s linear; }
        .glitch-shake { animation: glitchShake 0.08s infinite; }
        .glitch-zoom { animation: glitchZoom 0.2s infinite; }
        .glitch-rainbow { animation: glitchRainbow 0.4s infinite; }
        .glitch-bands { animation: glitchColorBands 0.3s infinite; }
        
        /* 滚动控制条样式 */
        .scroll-bar-container {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.8);
            padding: 10px 20px;
            border-radius: 15px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            z-index: 100;
            display: none; /* 默认隐藏 */
            flex-direction: column;
            align-items: center;
            gap: 5px;
            backdrop-filter: blur(5px);
        }
        
        .scroll-label {
            color: white;
            font-family: monospace;
            font-size: 14px;
        }
        
        .scroll-slider {
            width: 200px;
            height: 8px;
            -webkit-appearance: none;
            appearance: none;
            background: rgba(100, 100, 150, 0.5);
            border-radius: 5px;
            outline: none;
            cursor: pointer;
        }
        
        .scroll-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 25px;
            height: 25px;
            background: linear-gradient(135deg, #ff66ff, #66ffff);
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(100, 200, 255, 0.8);
        }
        
        .scroll-slider::-moz-range-thumb {
            width: 25px;
            height: 25px;
            background: linear-gradient(135deg, #ff66ff, #66ffff);
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(100, 200, 255, 0.8);
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
</head>
<body>
<!-- 开屏动画 Canvas -->
<canvas id="openingCanvas"></canvas>
<!-- 过渡页面 -->
<div class="transition-page" id="transitionPage">
    <div class="transition-content">
        <h1>WELCOME</h1>
        <p>ENTER THE VOID</p>
    </div>
</div>
<!-- 80个bookcase页面的滚轮控制条 -->
<div id="mainScrollBar" class="scroll-bar-container">
    <div class="scroll-label">📚 Scroll Shelf</div>
    <input type="range" id="mainScrollSlider" class="scroll-slider" min="-3" max="3" step="0.05" value="0">
</div>

<!-- 推送页面的滚轮控制条 -->
<div id="pushScrollBar" class="scroll-bar-container">
    <div class="scroll-label">📚 Scroll Push</div>
    <input type="range" id="pushScrollSlider" class="scroll-slider" min="-3" max="3" step="0.05" value="0">
</div>
<div id="info">"%&amp; Library | 点击书架 Click bookcase| 滑动浏览 Slide to browse</div>


<script>

// =====================================================
// 坐标转换函数 - 处理横屏旋转
// =====================================================
function isPortrait() {
    return windowWidth < windowHeight;
}

function transformMouseCoords(clientX, clientY) {
    if (!isPortrait()) {
        return { x: clientX, y: clientY };
    }
    
    // 竖屏时（CSS旋转了90度），需要转换坐标
    // canvas尺寸是交换后的: width = windowHeight, height = windowWidth
    const newX = clientY;
    const newY = windowWidth - clientX;
    
    return { x: newX, y: newY };
}

// =====================================================
// 声音系统
// =====================================================
let audioSystem = {
    // 声音对象
    openingSound: null,
    backgroundSound: null,
    scrollSound: null,
    startClickSound: null,
    glitchSound: null,
    // 状态
    isOpeningSoundPlaying: false,
    isBackgroundSoundPlaying: false,
    isScrollSoundPlaying: false,
    isGlitchSoundPlaying: false,
    // 计时器
    scrollSoundTimeout: null,
    glitchStopTimeout: null,
    // 滚动状态
    isScrolling: false,
    lastScrollTime: 0,
    // 播放视频后是否播放背景音
    playBackgroundAfterVideo: false,
    // 音量备份
    backgroundVolumeBackup: null
};

// 初始化声音系统
function initAudioSystem() {
    console.log('Initializing audio system...');
    
    audioSystem.openingSound = new Audio('images/开屏动画声音.m4a');
    audioSystem.backgroundSound = new Audio('images/页面背景音.m4a');
    audioSystem.scrollSound = new Audio('images/书架翻滚声音.m4a');
    audioSystem.startClickSound = new Audio('images/start点击声音.m4a');
    audioSystem.glitchSound = new Audio('images/故障声音.m4a');
    
    // 添加加载事件监听
    [audioSystem.openingSound, audioSystem.backgroundSound, 
     audioSystem.scrollSound, audioSystem.startClickSound, audioSystem.glitchSound].forEach((audio, index) => {
        audio.addEventListener('loadeddata', () => {
            console.log('Audio loaded:', index);
        });
        audio.addEventListener('error', (e) => {
            console.error('Audio load error:', index, e);
        });
    });
    
    // 设置循环
    audioSystem.openingSound.loop = true;
    audioSystem.backgroundSound.loop = true;
    audioSystem.scrollSound.loop = true;
    
    // 初始音量（设置为0.5，即一半音量）
    audioSystem.openingSound.volume = 0.5;
    audioSystem.backgroundSound.volume = 0.5;
    audioSystem.scrollSound.volume = 0.5;
    audioSystem.startClickSound.volume = 0.5;
    audioSystem.glitchSound.volume = 1.0;
    
    console.log('Audio system initialized');
}

// 播放开屏声音
function playOpeningSound() {
    // 如果正在播放视频，不播放开屏声音
    if (isVideoPlaying) return;
    
    if (!audioSystem.isOpeningSoundPlaying && audioSystem.openingSound) {
        audioSystem.openingSound.play().catch(e => console.log('Audio play error:', e));
        audioSystem.isOpeningSoundPlaying = true;
    }
}

// 停止开屏声音（立即停止）
function stopOpeningSound() {
    if (audioSystem.isOpeningSoundPlaying && audioSystem.openingSound) {
        audioSystem.openingSound.pause();
        audioSystem.openingSound.currentTime = 0;
        audioSystem.isOpeningSoundPlaying = false;
    }
}

// 播放背景音（完整无缝循环）
function playBackgroundSound() {
    // 如果正在播放视频，不播放背景音
    if (isVideoPlaying) return;
    
    if (!audioSystem.isBackgroundSoundPlaying && audioSystem.backgroundSound) {
        // 启用无缝循环
        audioSystem.backgroundSound.loop = true;
        audioSystem.backgroundSound.play().catch(e => console.log('Audio play error:', e));
        audioSystem.isBackgroundSoundPlaying = true;
    }
}

// 停止背景音
function stopBackgroundSound() {
    if (audioSystem.isBackgroundSoundPlaying && audioSystem.backgroundSound) {
        audioSystem.backgroundSound.pause();
        audioSystem.backgroundSound.currentTime = 0;
        audioSystem.backgroundSound.loop = false;
        audioSystem.isBackgroundSoundPlaying = false;
    }
}

// 播放故障音效（使用故障声音.m4a文件）
function playGlitchSound(duration = 1000) {
    // 如果正在播放视频，不播放故障音效（避免声音冲突）
    if (isVideoPlaying) {
        console.log('[AUDIO] Glitch sound blocked during video playback');
        return;
    }
    
    console.log('Attempting to play glitch sound for', duration, 'ms...');
    
    if (!audioSystem.glitchSound) {
        console.error('Glitch sound not loaded');
        return;
    }
    
    // 确保当前没有正在播放
    stopGlitchSound();
    
    // 静音背景音
    if (!audioSystem.backgroundVolumeBackup) {
        audioSystem.backgroundVolumeBackup = audioSystem.backgroundSound ? audioSystem.backgroundSound.volume : 0.5;
    }
    if (audioSystem.backgroundSound && audioSystem.isBackgroundSoundPlaying) {
        audioSystem.backgroundSound.volume = 0;
    }
    
    audioSystem.isGlitchSoundPlaying = true;
    
    // 获取故障音频文件的总时长
    const totalDuration = audioSystem.glitchSound.duration || 5; // 默认5秒
    
    // 随机选择起始位置（确保有足够的时间播放指定时长）
    const maxStart = Math.max(0, totalDuration - duration / 1000);
    const startTime = Math.random() * maxStart;
    
    try {
        audioSystem.glitchSound.currentTime = startTime;
        audioSystem.glitchSound.play().catch(e => console.log('Glitch sound play error:', e));
        
        // 设置定时器在指定时长后停止
        audioSystem.glitchStopTimeout = setTimeout(() => {
            stopGlitchSound();
        }, duration);
        
        console.log('Glitch sound started successfully at', startTime, 'for', duration, 'ms');
    } catch (e) {
        console.error('Error playing glitch sound:', e);
        audioSystem.isGlitchSoundPlaying = false;
    }
}

// 停止故障音效
function stopGlitchSound() {
    console.log('Stopping glitch sound...');
    
    // 清除停止定时器
    if (audioSystem.glitchStopTimeout) {
        clearTimeout(audioSystem.glitchStopTimeout);
        audioSystem.glitchStopTimeout = null;
    }
    
    // 停止故障音效
    if (audioSystem.glitchSound) {
        try {
            audioSystem.glitchSound.pause();
            audioSystem.glitchSound.currentTime = 0;
        } catch (e) {
            console.error('Error stopping glitch sound:', e);
        }
    }
    
    audioSystem.isGlitchSoundPlaying = false;
    
    // 恢复背景音音量
    if (audioSystem.backgroundSound && !audioSystem.backgroundSound.paused) {
        audioSystem.backgroundSound.volume = audioSystem.backgroundVolumeBackup || 0.5;
    }
    
    console.log('Glitch sound stopped');
}

// 视频播放完后播放背景音
function playBackgroundAfterVideoEnded() {
    audioSystem.playBackgroundAfterVideo = true;
    if (!audioSystem.isBackgroundSoundPlaying && audioSystem.backgroundSound) {
        // 启用无缝循环
        audioSystem.backgroundSound.loop = true;
        audioSystem.backgroundSound.play().catch(e => console.log('Audio play error:', e));
        audioSystem.isBackgroundSoundPlaying = true;
    }
}

// 开始滚动声音
function startScrollSound() {
    // 如果正在播放视频，不播放滚动声音
    if (isVideoPlaying) return;
    
    audioSystem.isScrolling = true;
    audioSystem.lastScrollTime = Date.now();
    if (!audioSystem.isScrollSoundPlaying && audioSystem.scrollSound) {
        audioSystem.scrollSound.play().catch(e => console.log('Audio play error:', e));
        audioSystem.isScrollSoundPlaying = true;
    }
    // 清除之前的超时
    if (audioSystem.scrollSoundTimeout) {
        clearTimeout(audioSystem.scrollSoundTimeout);
    }
}

// 更新滚动声音（在用户停止滚动后延迟停止）
function updateScrollSound() {
    // 如果正在播放视频，完全禁止滚动声音
    if (isVideoPlaying) {
        if (audioSystem.isScrollSoundPlaying && audioSystem.scrollSound) {
            audioSystem.scrollSound.pause();
            audioSystem.scrollSound.currentTime = 0;
            audioSystem.isScrollSoundPlaying = false;
        }
        audioSystem.isScrolling = false;
        return;
    }
    
    if (audioSystem.isScrolling && Date.now() - audioSystem.lastScrollTime > 300) {
        audioSystem.isScrolling = false;
        audioSystem.scrollSoundTimeout = setTimeout(() => {
            if (audioSystem.isScrollSoundPlaying && audioSystem.scrollSound) {
                audioSystem.scrollSound.pause();
                audioSystem.scrollSound.currentTime = 0;
                audioSystem.isScrollSoundPlaying = false;
            }
        }, 100);
    }
}

// 播放start点击声音
function playStartClickSound() {
    // 如果正在播放视频，不播放start点击声音（避免声音冲突）
    if (isVideoPlaying) return;
    
    if (audioSystem.startClickSound) {
        audioSystem.startClickSound.currentTime = 0;
        audioSystem.startClickSound.play().catch(e => console.log('Audio play error:', e));
    }
}

// =====================================================
// 开屏动画
// =====================================================
(function(){
    const openingCanvas = document.getElementById('openingCanvas');
    const ctx = openingCanvas.getContext('2d');
    let width, height;

    let particles = [];
    const PARTICLE_COUNT = 190;
    let GRAVITY = 0.065;
    let startZone = { w: 0, h: 70 };
    let isStartTriggered = false;
    let vortexAnimation = false;
    let vortexCenter = { x: 0, y: 0 };
    let vortexDuration = 3000;
    let vortexStartTime = 0;
    let transitionToMain = false;
    let isHoveringStart = false;
    let clickRipple = null;
    let frameCount = 0;
    let currentMouseX = 0, currentMouseY = 0;
    
    // 加载进度相关变量
    let isLoadingComplete = false;
    let loadingProgress = 0;
    let totalResources = 81; // 80张图片 + 1个label
    let loadedResources = 0;

    function randomRange(min, max) {
        return min + Math.random() * (max - min);
    }

    function randomChar() {
        const chars = 'abcdefghijklmnopqrstuvwxyz0123456789';
        return chars[Math.floor(Math.random() * chars.length)];
    }

    const trailColors = [
        '#ff0000', '#ff3300', '#ff6600', '#ff9900', '#ffcc00',
        '#00ff00', '#33ff33', '#66ff66', '#99ff99',
        '#00ffff', '#33ffff', '#66ffff',
        '#ff00ff', '#ff33ff', '#ff66ff',
        '#ffffff', '#cccccc', '#999999'
    ];

    function randomTrailColor() {
        return trailColors[Math.floor(Math.random() * trailColors.length)];
    }

    class Particle {
        constructor(x, y, size, char, vx, vy) {
            this.x = x;
            this.y = y;
            this.size = size;
            this.char = char;
            this.vx = vx;
            this.vy = vy;
            this.trail = [];
            this.maxTrailLen = Math.floor(randomRange(5, 8));
            this.trailColor = randomTrailColor();
            this.bouncing = false;
            this.bounceTimer = 0;
            this.startX = 0;
            this.startY = 0;
            this.convergeSpeed = 0.5 + Math.random() * 1.3;
            this.spiralDir = Math.random() > 0.5 ? 1 : -1;
            this.spiralTurns = 2 + Math.random() * 4;
            this.pathOffset = randomRange(0, Math.PI * 2);
        }

        updateNormal(zone) {
            this.vy += GRAVITY;
            this.vx *= 0.99;
            this.x += this.vx;
            this.y += this.vy;

            if(this.bouncing) {
                this.bounceTimer--;
                if(this.bounceTimer <= 0) this.bouncing = false;
            }

            if(!this.bouncing) {
                const rad = this.size * 0.7;
                const startX = width / 2 - zone.w / 2;
                const startY = height / 2 + 50 - zone.h / 2;

                if(this.x + rad > startX && this.x - rad < startX + zone.w &&
                   this.y + rad > startY && this.y - rad < startY + zone.h) {
                    this.bouncing = true;
                    this.bounceTimer = 30;
                    this.vx = (Math.random() - 0.5) * 8;
                    this.vy = -Math.random() * 8 - 3;
                    this.trailColor = randomTrailColor();
                    if(this.y < startY + zone.h/2) this.y = startY - rad;
                    else this.y = startY + zone.h + rad;
                    if(this.vx > 6) this.vx = 6;
                    if(this.vx < -6) this.vx = -6;
                }
            }

            if(this.y - this.size > height + 80 || this.x + this.size < -80 || this.x - this.size > width + 80 || this.y + this.size < -100) {
                this.resetToTop();
                return;
            }

            this.trail.unshift({x: this.x, y: this.y, char: this.char});
            while(this.trail.length > this.maxTrailLen) {
                this.trail.pop();
            }
        }

        prepareConverge() {
            this.startX = this.x;
            this.startY = this.y;
            let dx = this.startX - vortexCenter.x;
            let dy = this.startY - vortexCenter.y;
            this.dirAngle = Math.atan2(dy, dx);
            this.distance = Math.hypot(dx, dy);
        }

        updateConverge(baseProgress) {
            let individualProgress = Math.min(1, baseProgress * this.convergeSpeed);
            let ease = 1 - Math.pow(1 - individualProgress, 1.3);
            let r = this.distance * (1 - ease);
            let spiralStrength = Math.sin(ease * Math.PI) * this.distance * 0.35;
            let spiralAngle = this.spiralDir * ease * Math.PI * 2 * this.spiralTurns + this.pathOffset;
            let wiggleX = Math.sin(ease * Math.PI * 3 + this.pathOffset) * spiralStrength * 0.5;
            let wiggleY = Math.cos(ease * Math.PI * 2.5 + this.pathOffset * 1.3) * spiralStrength * 0.5;
            let targetX = vortexCenter.x + Math.cos(this.dirAngle) * r;
            let targetY = vortexCenter.y + Math.sin(this.dirAngle) * r;
            let perpX = -Math.sin(this.dirAngle);
            let perpY = Math.cos(this.dirAngle);

            this.x = targetX + perpX * Math.cos(spiralAngle) * spiralStrength + wiggleX;
            this.y = targetY + perpY * Math.sin(spiralAngle) * spiralStrength + wiggleY;

            this.trail.unshift({x: this.x, y: this.y, char: this.char});
            while(this.trail.length > this.maxTrailLen) {
                this.trail.pop();
            }
        }

        resetToTop() {
            this.x = randomRange(10, width - 10);
            this.y = randomRange(-30, -5);
            this.size = randomRange(7, 15);
            this.vy = this.size * 0.24 + randomRange(0.3, 1.1);
            this.vx = randomRange(-0.5, 0.5);
            this.char = randomChar();
            this.trail = [];
            this.maxTrailLen = Math.floor(randomRange(5, 8));
            this.trailColor = randomTrailColor();
            this.bouncing = false;
            this.bounceTimer = 0;
        }

        draw() {
            for(let i = 0; i < this.trail.length; i++) {
                const pos = this.trail[i];
                const alphaFactor = (this.trail.length - i) / this.trail.length;
                let col = this.trailColor;
                let r = parseInt(col.slice(1,3), 16);
                let g = parseInt(col.slice(3,5), 16);
                let b = parseInt(col.slice(5,7), 16);
                ctx.save();
                ctx.shadowBlur = 0;
                ctx.font = `${this.size}px 'Courier New', monospace`;
                ctx.fillStyle = `rgba(${r}, ${g}, ${b}, ${0.2 + alphaFactor * 0.55})`;
                ctx.fillText(pos.char || this.char, pos.x - this.size/2, pos.y + this.size/3);
                ctx.restore();
            }

            ctx.save();
            ctx.shadowBlur = 6;
            ctx.shadowColor = "rgba(255,255,255,0.5)";
            ctx.font = `${this.size}px 'Courier New', monospace`;
            ctx.fillStyle = "#ffffff";
            ctx.fillText(this.char, this.x - this.size/2, this.y + this.size/3);
            ctx.restore();
        }
    }

    function initParticles() {
        particles = [];
        for(let i=0; i<PARTICLE_COUNT; i++) {
            const size = randomRange(7, 15);
            const x = randomRange(15, width - 15);
            const y = randomRange(-40, height * 0.9);
            const vy = size * 0.24 + randomRange(0.3, 1.0);
            const vx = randomRange(-0.5, 0.5);
            const char = randomChar();
            particles.push(new Particle(x, y, size, char, vx, vy));
        }
    }

    function updateZoneRect() {
        ctx.save();
        ctx.font = `bold 56px 'Courier New', monospace`;
        let textW = ctx.measureText("START").width;
        ctx.restore();
        startZone.w = Math.min(textW + 80, width * 0.5);
        startZone.h = 70;
    }

    function drawStartButton() {
        if(transitionToMain || isStartTriggered) return;

        const startX = width / 2 - startZone.w / 2;
        const startY = height / 2 + 50 - startZone.h / 2;

        isHoveringStart = (currentMouseX > startX && currentMouseX < startX + startZone.w &&
                           currentMouseY > startY && currentMouseY < startY + startZone.h);
        
        // 设置鼠标样式：加载未完成时显示not-allowed
        if (isHoveringStart) {
            if (!isLoadingComplete) {
                openingCanvas.style.cursor = 'not-allowed';
            } else {
                openingCanvas.style.cursor = 'pointer';
            }
        } else {
            openingCanvas.style.cursor = 'default';
        }

        const centerX = width / 2;
        const centerY = height / 2 + 50;

        // 如果加载未完成，显示进度条
        if (!isLoadingComplete) {
            // 绘制进度条背景
            const barWidth = 300;
            const barHeight = 20;
            const barX = centerX - barWidth / 2;
            const barY = centerY - barHeight / 2;
            
            ctx.save();
            // 进度条背景
            ctx.fillStyle = 'rgba(60, 60, 80, 0.8)';
            ctx.fillRect(barX, barY, barWidth, barHeight);
            
            // 进度条边框
            ctx.strokeStyle = 'rgba(200, 200, 220, 0.5)';
            ctx.lineWidth = 2;
            ctx.strokeRect(barX, barY, barWidth, barHeight);
            
            // 进度条填充
            const progressWidth = barWidth * loadingProgress;
            const gradient = ctx.createLinearGradient(barX, barY, barX + progressWidth, barY);
            gradient.addColorStop(0, '#ff66ff');
            gradient.addColorStop(0.5, '#ffffff');
            gradient.addColorStop(1, '#66ffff');
            ctx.fillStyle = gradient;
            ctx.fillRect(barX, barY, progressWidth, barHeight);
            
            // 加载百分比文字
            ctx.font = "14px 'Courier New', monospace";
            ctx.fillStyle = "#ffffff";
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.fillText(`Loading ${Math.floor(loadingProgress * 100)}%`, centerX, centerY + 35);
            
            ctx.restore();
            return;
        }

        // 加载完成后，显示START按钮
        let fontSize = isHoveringStart ? 70 : 56;
        let glowAlpha = isHoveringStart ? 200 : 80;

        ctx.save();
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.font = `bold ${fontSize}px 'Courier New', monospace`;

        ctx.shadowBlur = isHoveringStart ? 35 : 15;
        ctx.shadowColor = `rgba(255, 200, 255, ${glowAlpha / 255})`;
        ctx.fillStyle = "#ffffff";
        ctx.fillText("START", centerX, centerY);

        ctx.shadowBlur = 0;
        ctx.restore();

        let breathAlpha = 0.5 + Math.sin(frameCount * 0.01) * 0.2;
        ctx.save();
        ctx.font = "14px 'Courier New', monospace";
        ctx.fillStyle = `rgba(200, 200, 220, ${breathAlpha})`;
        ctx.textAlign = "center";
        ctx.textBaseline = "top";
        ctx.fillText("▼ CLICK TO ENTER ▼", width / 2, height / 2 + 110);
        ctx.restore();
        
        // 添加声音提示
        let soundBreathAlpha = 0.5 + Math.sin(frameCount * 0.015) * 0.15;
        ctx.save();
        ctx.font = "12px 'Courier New', monospace";
        ctx.fillStyle = `rgba(255, 255, 255, ${soundBreathAlpha})`;
        ctx.textAlign = "center";
        ctx.textBaseline = "top";
        ctx.fillText("打开声音体验更佳 Turn on sound for a better experience", width / 2, height / 2 + 140);
        ctx.restore();

        if(clickRipple) {
            ctx.save();
            ctx.beginPath();
            ctx.arc(clickRipple.x, clickRipple.y, clickRipple.radius, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(255, 200, 100, ${clickRipple.alpha})`;
            ctx.fill();
            ctx.restore();

            clickRipple.radius += 6;
            clickRipple.alpha -= 0.04;
            if(clickRipple.alpha <= 0 || clickRipple.radius > 80) clickRipple = null;
        }
    }

    function startVortex() {
        if(isStartTriggered) {
            console.log('[DEBUG] startVortex already triggered, ignoring');
            return;
        }
        console.log('[DEBUG] startVortex called! Setting flags...');
        isStartTriggered = true;
        vortexAnimation = true;
        vortexStartTime = performance.now();
        vortexCenter.x = width / 2;
        vortexCenter.y = height / 2 + 50;

        // 2秒后停止开屏声音，开始背景音
        stopOpeningSound();
        playBackgroundSound();

        for(let p of particles) {
            p.prepareConverge();
        }
        
        console.log('[DEBUG] startVortex complete!', {
            isStartTriggered,
            vortexAnimation,
            vortexStartTime,
            vortexDuration
        });
    }

    function renderVortexAnimation(now) {
        const elapsed = now - vortexStartTime;
        let progress = Math.min(1, elapsed / vortexDuration);

        // 每100ms输出一次日志
        if (frameCount % 6 === 0) {
            console.log('[DEBUG] renderVortexAnimation:', {
                elapsed,
                progress,
                vortexDuration,
                shouldTransition: progress >= 1.0
            });
        }

        for(let p of particles) {
            p.updateConverge(progress);
        }

        ctx.fillStyle = "#000000";
        ctx.fillRect(0, 0, width, height);

        for(let p of particles) {
            p.draw();
        }

        let alpha = Math.max(0, 1 - progress * 1.5);
        ctx.save();
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.font = `bold 56px 'Courier New', monospace`;
        ctx.fillStyle = `rgba(255, 255, 255, ${alpha})`;
        ctx.fillText("START", width / 2, height / 2 + 50);
        ctx.restore();

        if(progress > 0.5) {
            let blackAlpha = (progress - 0.5) * 2;
            ctx.fillStyle = `rgba(0, 0, 0, ${blackAlpha})`;
            ctx.fillRect(0, 0, width, height);
        }

        if(progress >= 1.0) {
            console.log('[DEBUG] Transition to main app starting...');
            vortexAnimation = false;
            transitionToMain = true;
            document.getElementById('transitionPage').classList.add('active');
            // 直接执行跳转逻辑，不要使用setTimeout（手机浏览器会因为失去用户激活上下文而拦截）
            openingCanvas.style.display = 'none';
            document.getElementById('transitionPage').style.display = 'none';
            
            // 显示p5.js的canvas
            const allCanvases = document.querySelectorAll('canvas');
            allCanvases.forEach((canvas) => {
                if (canvas.id !== 'openingCanvas') {
                    canvas.style.display = 'block';
                }
            });
            
            // 启动主游戏
            window.startMainApp();
            
            // 进入选择页面阶段
            isSelectionPhase = true;
            selectionPhaseStartTime = millis(); // 记录选择页面开始时间
            initSelectionCircles();
            
            console.log('[DEBUG] Transition complete! isSelectionPhase:', isSelectionPhase);
        }
    }

    function renderNormal() {
        ctx.fillStyle = "#000000";
        ctx.fillRect(0, 0, width, height);

        for(let p of particles) {
            p.updateNormal(startZone);
            p.draw();
        }

        drawStartButton();
    }

    function addClickRipple(x, y) {
        clickRipple = { x: x, y: y, radius: 5, alpha: 0.6 };
    }

    function handleCanvasClick(e) {
        if(!isLoadingComplete || isStartTriggered || vortexAnimation || transitionToMain) {
            console.log('[DEBUG] Click blocked:', {isLoadingComplete, isStartTriggered, vortexAnimation, transitionToMain});
            return;
        }

        let mouseX, mouseY;
        if (e.isPreTransformed) {
            // 如果坐标已经转换过，直接使用
            mouseX = e.clientX;
            mouseY = e.clientY;
        } else {
            // 否则使用openingTransformCoords转换坐标（不是transformMouseCoords！）
            let coords = openingTransformCoords(e.clientX, e.clientY);
            mouseX = coords.x;
            mouseY = coords.y;
        }
        
        const startX = width / 2 - startZone.w / 2;
        const startY = height / 2 + 50 - startZone.h / 2;

        console.log('[DEBUG] handleCanvasClick:', {
            mouseX, mouseY,
            startX, startY,
            startZoneW: startZone.w,
            startZoneH: startZone.h
        });

        if(mouseX > startX && mouseX < startX + startZone.w &&
           mouseY > startY && mouseY < startY + startZone.h) {
            console.log('[DEBUG] START button clicked! Calling startVortex...');
            // 播放start点击声音
            playStartClickSound();
            addClickRipple(width / 2, height / 2 + 50);
            startVortex();
        } else {
            console.log('[DEBUG] Click outside START button');
        }
    }

    function handleMouseMove(e) {
        // 转换坐标（使用开屏动画专用的坐标转换函数）
        let coords = openingTransformCoords(e.clientX, e.clientY);
        currentMouseX = coords.x;
        currentMouseY = coords.y;
    }

    let animationId = null;

    function render(now) {
        if(!ctx) return;
        frameCount++;
        
        // 每60帧输出一次日志
        if (frameCount % 60 === 0) {
            console.log('[DEBUG] render called:', {
                frameCount,
                vortexAnimation,
                transitionToMain,
                animationId
            });
        }

        if(vortexAnimation) {
            renderVortexAnimation(now);
        } else if(!transitionToMain) {
            renderNormal();
        }

        // 只有在没有过渡到主应用时才继续渲染
        if(!transitionToMain) {
            animationId = requestAnimationFrame(render);
        } else {
            // 正在过渡，停止所有动画
            if (animationId) {
                cancelAnimationFrame(animationId);
                animationId = null;
            }
        }
    }

    function resizeCanvas() {
        // 确保始终使用横屏比例（16:9）
        const isPortrait = window.innerWidth < window.innerHeight;
        if (isPortrait) {
            width = window.innerHeight;
            height = window.innerWidth;
        } else {
            width = window.innerWidth;
            height = window.innerHeight;
        }
        openingCanvas.width = width;
        openingCanvas.height = height;
        updateZoneRect();

        if(particles.length > 0) {
            for(let p of particles) {
                if(p.x > width + 100 || p.x < -100 || p.y > height + 150 || p.y < -150) {
                    p.resetToTop();
                } else {
                    p.x = Math.min(width - 10, Math.max(10, p.x));
                    p.y = Math.min(height, Math.max(-30, p.y));
                }
            }
        } else {
            initParticles();
        }
    }
    
    // 开屏动画的触摸坐标转换
    function openingTransformCoords(clientX, clientY) {
        const isPortrait = window.innerWidth < window.innerHeight;
        if (!isPortrait) {
            return { x: clientX, y: clientY };
        }
        
        // 竖屏时（CSS旋转了90度），需要转换坐标
        const newX = clientY;
        const newY = window.innerWidth - clientX;
        
        return { x: newX, y: newY };
    }

    function bindEvents() {
        openingCanvas.addEventListener('click', handleCanvasClick);
        openingCanvas.addEventListener('mousemove', handleMouseMove);
        window.addEventListener('resize', () => resizeCanvas());
        
        // 添加触摸事件支持（手机端）
        openingCanvas.addEventListener('touchstart', function(e) {
            e.preventDefault();
            if (e.touches.length > 0) {
                const touch = e.touches[0];
                // 转换坐标
                let coords = openingTransformCoords(touch.clientX, touch.clientY);
                currentMouseX = coords.x;
                currentMouseY = coords.y;
                // 移动端：首次触摸时播放声音
                if (!window.openingSoundStarted) {
                    window.openingSoundStarted = true;
                    playOpeningSound();
                }
            }
        }, {passive: false});
        
        openingCanvas.addEventListener('touchend', function(e) {
        e.preventDefault();
        if (e.changedTouches.length > 0) {
            const touch = e.changedTouches[0];
            // 直接使用openingTransformCoords转换后的坐标传递给handleCanvasClick
            // 但是不使用isPreTransformed标记，直接在touchend里直接计算转换
            const coords = openingTransformCoords(touch.clientX, touch.clientY);
            
            console.log('[DEBUG] Touch end - original:', touch.clientX, touch.clientY);
            console.log('[DEBUG] Touch end - transformed:', coords.x, coords.y);
            console.log('[DEBUG] Touch end - canvas size:', width, height);
            console.log('[DEBUG] Touch end - isPortrait:', window.innerWidth < window.innerHeight);
            
            const clickEvent = {
                clientX: coords.x,
                clientY: coords.y,
                isPreTransformed: true // 标记：坐标已经转换过
            };
            handleCanvasClick(clickEvent);
        }
    }, {passive: false});
        
        // PC端：鼠标首次点击时播放声音
        openingCanvas.addEventListener('click', function(e) {
            if (!window.openingSoundStarted) {
                window.openingSoundStarted = true;
                playOpeningSound();
            }
        });
    }

    // 暴露加载进度更新函数到全局（供p5.js调用）
    window.openingUpdateProgress = function(progress) {
        loadingProgress = progress;
    };
    
    // 暴露设置加载完成函数到全局
    window.openingSetLoadingComplete = function() {
        isLoadingComplete = true;
    };

    function initOpening() {
        resizeCanvas();
        initParticles();
        bindEvents();
        currentMouseX = width / 2;
        currentMouseY = height / 2;
        // 初始化声音系统
        initAudioSystem();
        // 注意：声音会在用户首次交互时播放（移动端自动播放限制）
        window.openingSoundStarted = false;
        render();
    }

    initOpening();
    
    // 暴露重置函数到全局
    window.resetOpening = function() {
        console.log('Resetting opening animation...');
        
        // 确保开屏canvas是可见的
        const openingCanvas = document.getElementById('openingCanvas');
        if (openingCanvas) {
            openingCanvas.style.display = 'block';
        }
        
        isStartTriggered = false;
        vortexAnimation = false;
        transitionToMain = false;
        isHoveringStart = false;
        clickRipple = null;
        isLoadingComplete = false;
        loadingProgress = 0;
        loadedResources = 0;
        
        // 重新初始化粒子
        particles = [];
        initParticles();
        
        // 重置声音标记，等待用户首次交互
        window.openingSoundStarted = false;
        // 重新开始播放开屏声音（用户已有点击交互，应该可以播放）
        playOpeningSound();
        
        // 清除之前的动画循环
        if (animationId) {
            cancelAnimationFrame(animationId);
            animationId = null;
        }
        
        // 重新开始渲染
        render();
        
        console.log('Opening animation reset complete');
    };
    
    // 暴露进入主游戏的函数
    window.triggerMainGame = function() {
        // 显示过渡页面
        document.getElementById('transitionPage').classList.add('active');
        setTimeout(() => {
            openingCanvas.style.display = 'none';
            document.getElementById('transitionPage').style.display = 'none';
            
            // 确保p5.js循环正在运行
            if (!window.mainAppStarted) {
                window.mainAppStarted = true;
                loop();
            }
            
            // 进入选择页面阶段
            window.isSelectionPhase = true;
            window.selectionPhaseStartTime = millis(); // 记录选择页面开始时间
            selectionPhaseStartTime = millis();
            initSelectionCircles();
        }, 1500);
    };
})();

// 更新屏幕缩放因子 - 放大到1.5倍
function updateScreenScale() {
    const baseWidth = 1920;
    const baseHeight = 1080;
    const scaleFactor = min(width / baseWidth, height / baseHeight);
    // 放大到1.5倍，并限制范围
    screenScale = constrain(scaleFactor * 1.5, 0.6, 2.0);
}

// 初始化选择页面的圆点
function initSelectionCircles() {
    selectionCircles = [];
    const centerX = width / 2;
    const centerY = height / 2 + 50 * screenScale;
    
    const totalCircles = 80;
    const phi = Math.PI * (3 - Math.sqrt(5)); // 黄金角度
    const maxRadius = (Math.min(width, height) / 2 - 60 * screenScale) * screenScale;
    
    for (let i = 0; i < totalCircles; i++) {
        // 斐波那契螺旋算法 - 横向稍微加宽
        const radius = Math.sqrt(i) / Math.sqrt(totalCircles) * maxRadius;
        const angle = i * phi;
        
        let x = centerX + Math.cos(angle) * radius * 1.15; // 横向增加15%
        let y = centerY + Math.sin(angle) * radius;
        
        // 确保在屏幕范围内
        const margin = 40 * screenScale;
        x = constrain(x, margin, width - margin);
        y = constrain(y, 80 * screenScale, height - margin);
        
        // 出现延迟：外层比内层稍晚出现
        const appearDelay = (radius / maxRadius) * 600;
        
        selectionCircles.push({
            x: x,
            y: y,
            baseX: x,
            baseY: y,
            title: imageFileNames[i] + " " + getEnglish(imageFileNames[i]),
            id: i,
            hoverPhase: random(TWO_PI),
            hoverIntensity: 0,
            textWidth: 0,
            displayX: x,
            displayY: y,
            appearDelay: appearDelay,
            appearProgress: 0
        });
    }
}

    // 文字
    fill(255);
    text(titleText, width / 2, 45 * screenScale);
    
    // 绘制副标题
    textSize(14 * screenScale);
    let subTitleText = "Select and click the content you want to explore 选择并点击你想要了解的内容";
    let subTitleWidth = textWidth(subTitleText);
    let subTitleHeight = 22 * screenScale;
    // 黑色遮罩
    fill(0, 0, 0, 200);
    rect(width / 2 - subTitleWidth / 2 - 10, 80 * screenScale - subTitleHeight / 2, subTitleWidth + 20, subTitleHeight);
    // 文字
    fill(180);
    text(subTitleText, width / 2, 80 * screenScale);
    
    // 绘制80个圆点
    textFont('monospace');
    textSize(12 * screenScale); // 默认文字大小
    const centerX = width / 2;
    const centerY = height / 2 + 50 * screenScale;
    
    // 首先计算所有圆点的距离，找到最近的（用于发光）
    let closestCircleId = -1;
    let minDistance = Infinity;
    
    for (let circle of selectionCircles) {
        let timeSinceStart = selectionPhaseTime - circle.appearDelay;
        if (timeSinceStart <= 0 || circle.appearProgress <= 0) continue;
        
        let t = circle.appearProgress;
        let easeT = 1 - Math.pow(1 - t, 3);
        let currentX = centerX + (circle.baseX - centerX) * easeT;
        let currentY = centerY + (circle.baseY - centerY) * easeT;
        
        let d = dist(canvasMouseX, canvasMouseY, currentX, currentY);
        if (d < 120 * screenScale && d < minDistance) {
            minDistance = d;
            closestCircleId = circle.id;
        }
    }
    
    for (let circle of selectionCircles) {
        // 更新出现进度
        let timeSinceStart = selectionPhaseTime - circle.appearDelay;
        if (timeSinceStart > 0) {
            let newProgress = Math.min(timeSinceStart / 500, 1); // 500ms完成出现动画
            circle.appearProgress = newProgress;
        }
        
        // 如果还没有开始出现，跳过
        if (circle.appearProgress <= 0) continue;
        
        // 从中心扩散到最终位置的动画
        let t = circle.appearProgress;
        // 使用ease-out缓动函数，先快后慢
        let easeT = 1 - Math.pow(1 - t, 3);
        
        // 计算当前显示位置：从中心向外扩散
        let currentX = centerX + (circle.baseX - centerX) * easeT;
        let currentY = centerY + (circle.baseY - centerY) * easeT;
        
        // 计算晃动
        let wobbleX = sin(millis() * 0.002 + circle.hoverPhase) * 3 * screenScale;
        let wobbleY = cos(millis() * 0.0025 + circle.hoverPhase) * 3 * screenScale;
        
        // 检测鼠标是否靠近（多个可以显示标题）
        let d = dist(canvasMouseX, canvasMouseY, currentX, currentY);
        let targetIntensity = d < 80 * screenScale ? 1 : 0; // 原本的80像素范围
        circle.hoverIntensity += (targetIntensity - circle.hoverIntensity) * 0.15;
        
        let displayX = currentX + wobbleX;
        let displayY = currentY + wobbleY;
        
        // 保存当前显示位置供点击检测使用
        circle.displayX = displayX;
        circle.displayY = displayY;
        
        // 根据出现进度调整透明度
        let alpha = circle.appearProgress * 255;
        
        // 判断是否是最近的（用于发光）
        let isClosest = (circle.id === closestCircleId);
        
        if (circle.hoverIntensity > 0.1) {
            // 悬停时显示文字
            textSize(16 * screenScale);
            textAlign(CENTER, BOTTOM);
            
            if (isClosest) {
                // 最近的：标题明显发光
                // 发光效果 - 更强烈
                drawingContext.shadowBlur = 25 * screenScale;
                drawingContext.shadowColor = 'rgba(255, 255, 100, 1)';
                fill(255, 255, 150, alpha * circle.hoverIntensity); // 淡黄色文字
                textSize(18 * screenScale); // 稍微大一点
                text(circle.title, displayX, displayY - 12 * screenScale);
                // 清除发光效果
                drawingContext.shadowBlur = 0;
            } else {
                // 其他的：普通白色标题
                fill(255, alpha * circle.hoverIntensity);
                textSize(16 * screenScale);
                text(circle.title, displayX, displayY - 12 * screenScale);
            }
            
            // 在文字下方绘制小圆点（正常圆点，不发光）
            noStroke();
            fill(255, alpha * 150 * circle.hoverIntensity);
            ellipse(displayX, displayY, 4 * screenScale, 4 * screenScale);
        } else {
            // 未悬停时显示小圆点
            noStroke();
            fill(255, alpha * 200);
            ellipse(displayX, displayY, 6 * screenScale, 6 * screenScale);
        }
    }
}

// 处理选择页面点击
function handleSelectionClick() {
    if (!isSelectionPhase) {
        return;
    }
    
    textFont('monospace');
    textSize(16);
    
    // 找到距离鼠标最近的圆点（不是hoverIntensity最高的）
    let closestCircle = null;
    let minDistance = Infinity;
    
    for (let circle of selectionCircles) {
        if (circle.displayX === undefined || circle.hoverIntensity <= 0.1) continue;
        
        let d = dist(canvasMouseX, canvasMouseY, circle.displayX, circle.displayY);
        // 只在80像素范围内有效
        if (d < 80 * screenScale && d < minDistance) {
            minDistance = d;
            closestCircle = circle;
        }
    }
    
    // 如果找到了最近的圆点，点击它
    if (closestCircle !== null) {
        isSelectionPhase = false;
        
        // 显示主页面的滚动条
        if (mainScrollBar) mainScrollBar.style.display = 'flex';
        if (pushScrollBar) pushScrollBar.style.display = 'none';
        
        // 保存初始旋转角度
        window.autoScrollInitialRotation = currentRotation;
        
        // 设置自动滚动目标
        autoScrollTargetId = closestCircle.id;
        autoScrollStartTime = millis();
        
        // 计算目标角度
        let targetBookcaseAngle = roomAngle[closestCircle.id];
        let topAngle = -HALF_PI;
        let angleDiff = topAngle - targetBookcaseAngle;
        
        // 标准化角度差
        while (angleDiff > PI) angleDiff -= TWO_PI;
        while (angleDiff < -PI) angleDiff += TWO_PI;
        
        window.autoScrollTargetRotation = currentRotation + angleDiff;
        window.selectedBookcaseId = closestCircle.id;
        isMainGameStarted = true;
    }
}

// 更新自动滚动（在draw函数中调用）
function updateAutoScroll() {
    if (autoScrollTargetId === -1) return;
    
    let elapsed = millis() - autoScrollStartTime;
    if (elapsed >= AUTO_SCROLL_DURATION) {
        // 滚动完成
        currentRotation = window.autoScrollTargetRotation || currentRotation;
        rotationVelocity = 0;
        autoScrollTargetId = -1;
        autoScrollCompleteTime = millis(); // 记录完成时间
        console.log('Auto scroll completed, cooldown starts');
        return;
    }
    
    // 计算缓动进度（ease-out）
    let progress = elapsed / AUTO_SCROLL_DURATION;
    let easeOut = 1 - Math.pow(1 - progress, 3); // 三次缓出
    
    // 计算目标旋转
    let targetRotation = window.autoScrollTargetRotation || currentRotation;
    
    // 应用缓动
    let initialRot = window.autoScrollInitialRotation || 0;
    currentRotation = initialRot + (targetRotation - initialRot) * easeOut;
}

function getEvasionFromClicks(clicks) {
    if (clicks <= 0) return 0;
    if (clicks <= 6) return (clicks / 6) * 0.15;
    if (clicks === 7) return 0.24;
    if (clicks === 8) return 0.33;
    if (clicks === 9) return 0.42;
    if (clicks === 10) return 0.51;
    if (clicks === 11) return 0.60;
    return 1.0;
}

function preload() {
    // 暴露加载进度更新函数到全局
    window.updateLoadingProgress = function(progress) {
        if (window.openingUpdateProgress) {
            window.openingUpdateProgress(progress);
        }
    };
    
    let loadedCount = 0;
    const totalCount = totalRooms + 1; // 图片 + label
    
    function checkAllLoaded() {
        loadedCount++;
        const progress = loadedCount / totalCount;
        window.updateLoadingProgress(progress);
        
        if (loadedCount >= totalCount) {
            // 所有资源加载完成
            window.updateLoadingProgress(1);
            if (window.openingSetLoadingComplete) {
                window.openingSetLoadingComplete();
            }
        }
    }
    
    for (let i = 0; i < totalRooms; i++) {
        let fileName = imageFileNames[i];
        nameToId[fileName] = i;
        
        let formats = ['.png', '.jpg', '.jpeg'];
        
        function tryLoad(formatIndex) {
            if (formatIndex >= formats.length) {
                let ph = createImage(400, 400);
                ph.loadPixels();
                for (let p = 0; p < ph.pixels.length; p++) ph.pixels[p] = color(random(100,200), random(90,170), random(120,210));
                ph.updatePixels();
                correctImages[i] = ph;
                checkAllLoaded();
                return;
            }
            
            let path = `images/${fileName}${formats[formatIndex]}`;
            loadImage(path,
                (img) => { 
                    correctImages[i] = img; 
                    checkAllLoaded();
                },
                () => { tryLoad(formatIndex + 1); }
            );
        }
        
        tryLoad(0);
    }
    labelImage = loadImage('images/label.jpg', () => {
        checkAllLoaded();
    });
}

// 滚动控制条元素
let mainScrollBar, mainScrollSlider;
let pushScrollBar, pushScrollSlider;

window.startMainApp = function() {
    if (mainAppStarted) return;
    mainAppStarted = true;
    
    // 初始化滚动控制条元素
    mainScrollBar = document.getElementById('mainScrollBar');
    mainScrollSlider = document.getElementById('mainScrollSlider');
    pushScrollBar = document.getElementById('pushScrollBar');
    pushScrollSlider = document.getElementById('pushScrollSlider');
    
    // 添加主页面滚动条事件
    if (mainScrollSlider) {
        mainScrollSlider.addEventListener('input', function() {
            let value = parseFloat(this.value);
            if (Math.abs(value) > 0.1) { // 只有当值足够大时才滚动
                rotationVelocity = value * 0.2;
                // 播放滚动声音（使用正确的函数）
                startScrollSound();
            }
            // 每次滚动都更新时间，确保声音持续
            audioSystem.lastScrollTime = Date.now();
        });
        
        mainScrollSlider.addEventListener('change', function() {
            // 停止滚动，重置滑块
            this.value = 0;
            // 停止滚动声音
            if (audioSystem.isScrollSoundPlaying && audioSystem.scrollSound) {
                audioSystem.scrollSound.pause();
                audioSystem.scrollSound.currentTime = 0;
                audioSystem.isScrollSoundPlaying = false;
            }
            // 重置滚动状态
            audioSystem.isScrolling = false;
        });
    }
    
    // 添加推送页面滚动条事件
    if (pushScrollSlider) {
        pushScrollSlider.addEventListener('input', function() {
            let value = parseFloat(this.value);
            if (Math.abs(value) > 0.1) { // 只有当值足够大时才滚动
                pushRotationVelocity = value * 0.2;
                // 播放滚动声音（使用正确的函数）
                startScrollSound();
            }
            // 每次滚动都更新时间，确保声音持续
            audioSystem.lastScrollTime = Date.now();
        });
        
        pushScrollSlider.addEventListener('change', function() {
            // 停止滚动，重置滑块
            this.value = 0;
            // 停止滚动声音
            if (audioSystem.isScrollSoundPlaying && audioSystem.scrollSound) {
                audioSystem.scrollSound.pause();
                audioSystem.scrollSound.currentTime = 0;
                audioSystem.isScrollSoundPlaying = false;
            }
            // 重置滚动状态
            audioSystem.isScrolling = false;
        });
    }
    
    loop();
};

function setup() {
    // 确保canvas始终使用横屏比例（16:9）
    const isPortrait = windowWidth < windowHeight;
    if (isPortrait) {
        // 竖屏时，交换宽高以保持横屏比例
        createCanvas(windowHeight, windowWidth);
    } else {
        createCanvas(windowWidth, windowHeight);
    }
    noLoop();
    textAlign(CENTER, CENTER);
    rectMode(CORNER);
    imageMode(CORNER);
    ellipseMode(CENTER);
    
    updateScreenScale();
    
    centerX = width / 2;
    centerY = height / 2 + 400 * screenScale;
    
    for (let i = 0; i < totalRooms; i++) {
        folderNames[i] = imageFileNames[i];
        roomAngle[i] = TWO_PI / totalRooms * i;
        clickCounts[i] = 0;
    }
    
    initRoomFloats();
    
    let timer = setInterval(() => {
        let all = true;
        for (let i = 0; i < totalRooms; i++) if (!correctImages[i]) all = false;
        if (all) {
            clearInterval(timer);
            buildGlitchMapping();
            updateBubblePositions();
        }
    }, 100);
    
    for (let i = 0; i < totalRooms; i++) {
        if (!correctImages[i]) {
            let ph = createImage(400, 400);
            ph.loadPixels();
            for (let p = 0; p < ph.pixels.length; p++) ph.pixels[p] = color(80, 70, 100);
            ph.updatePixels();
            correctImages[i] = ph;
        }
    }
}

function buildGlitchMapping() {
    let indices = Array.from({length: totalRooms}, (_, i) => i);
    for (let i = indices.length - 1; i > 0; i--) {
        let j = floor(random(i + 1));
        [indices[i], indices[j]] = [indices[j], indices[i]];
    }
    for (let i = 0; i < totalRooms; i++) {
        glitchImages[i] = correctImages[indices[i]];
    }
}

function updateBubblePositions() {
    for (let i = 0; i < totalRooms; i++) {
        let angle = roomAngle[i] + currentRotation;
        bubbleX[i] = centerX + cos(angle) * ellipseA * screenScale;
        bubbleY[i] = centerY + sin(angle) * ellipseB * screenScale;
    }
}

function initRoomFloats() {
    roomFloats = [];
    for (let i = 0; i < totalRooms; i++) {
        roomFloats.push({
            phaseX: random(TWO_PI),
            phaseY: random(TWO_PI),
            speedX: random(0.6, 1.6),
            speedY: random(0.4, 1.2),
            ampX: random(8, 15) * screenScale,
            ampY: random(6, 12) * screenScale
        });
    }
}

    "点赞通知": "点赞通知是社交时代最简单却最具力量的互动方式，一个小小的红心承载着无数的情感连接。当你看到屏幕上跳动的点赞数字时，那份被认可和欣赏的喜悦会瞬间温暖心田。点赞不仅是简单的认可动作，更是一种无声的支持和鼓励，它让创作者知道自己的内容正在被关注和喜爱。每一次点赞都代表着一个人的认可，无论是陌生人还是熟悉的朋友，这份来自他人的肯定都是珍贵的礼物。点赞通知让社交变得更加轻松愉快，也让我们在繁忙的生活中感受到来自四面八方的温暖。",
    
    "热搜榜": "热搜榜是当下最热门话题的实时排行榜，它反映了社会的关注焦点和舆论走向。热搜上的每一个词条都代表着千万人的共同兴趣，从娱乐八卦到社会事件，从科技新品到民生热点，内容包罗万象。热搜榜是时代的晴雨表，通过它我们可以快速了解社会正在发生什么，人们正在关心什么。登上热搜意味着巨大的曝光度和关注度，这对于个人、企业还是事件都具有重要意义。热搜榜让我们与这个世界保持同步，感受社会的脉动和时代的变迁。",
    
    "广告": "广告是商业社会最活跃的信息传播形式，它以各种形式渗透进我们的日常生活。优秀的广告不仅是商业宣传，更是一种创意艺术的展现，通过精妙的文案和视觉设计打动人心。广告的进化史就是一部人类消费文化和审美观念的变迁史，从传统媒体到数字平台，广告的形式和传播方式发生了翻天覆地的变化。现代广告更加注重用户体验和情感连接，试图在商业利益和用户价值之间找到平衡点，让广告不再是简单的信息灌输，而是有价值的互动内容。",
    
    "推荐页": "推荐页是内容平台的智能中枢，通过复杂的算法为用户推送最可能感兴趣的内容。每一次刷新都像打开一份精心准备的礼物，充满了未知和惊喜。推荐算法不断学习和进化，逐渐了解用户的喜好和习惯，让推荐变得越来越精准。推荐页改变了人们获取信息的方式，从主动搜索到被动接收，让内容主动找上门来。这个页面是连接内容和用户的桥梁，让优质内容得以被发现，也让用户找到了属于自己的内容花园。",
    
    "搜索栏": "搜索栏是互联网世界的大门，它连接着用户与海量的信息资源。只需输入几个关键词，无数相关的内容就会呈现在眼前，这是科技赋予我们的超能力。搜索栏的设计追求简洁高效，让用户能够以最快的速度找到所需信息。从学术资料到娱乐新闻，从生活技巧到专业知识，搜索栏满足了人们各种信息需求。搜索历史记录着我们的求知历程，每一次搜索都是对未知世界的一次探索。搜索栏虽小，却承载着人类对知识的渴望和对世界的探索精神。",
    
    "聊天界面": "聊天界面是现代人日常沟通的主要工具，它让远在天边的人也能近在咫尺。文字、表情、语音、图片，多种表达方式让沟通变得更加丰富和有趣。聊天记录承载着人与人之间的情感记忆，翻看旧时的对话，仿佛能穿越时空回到那些美好时刻。聊天界面不仅是信息交换的场所，更是情感交流的平台，每一个表情包和语气词都蕴含着细腻的情感表达。在快节奏的生活中，聊天界面为我们提供了一个可以随时联系的温暖空间，让友谊和亲情不受距离限制。",
    
    "朋友圈": "朋友圈是记录生活、分享心情的温暖空间，每一条动态都是生活的一个切片。在这里我们分享美食、旅行、感悟和工作，让朋友了解自己的近况。朋友圈也是了解朋友生活的窗口，通过他人的分享，我们得以窥见不同的人生故事和世界角度。精心编排的朋友圈是一条视觉和内容的双重展示，体现着发布者的审美和价值观。朋友圈的互动让社交变得更加轻松，一个点赞一句评论都是温暖的关怀。这里是我们展示真实自我的舞台，也是与朋友保持连接的纽带。",
    
    "购物车": "购物车是电商时代最实用的工具之一，它承载着人们对美好生活的向往和期待。每一件加入购物车的商品都代表着一种需求或渴望，也许是犒劳自己的礼物，也许是给家人的惊喜。购物车是理性与欲望的战场，消费者在这里权衡比较，做出最终的购买决定。购物车的历史记录反映了一个人的消费轨迹和生活变迁，从中也可以看出时代的变化和审美的演变。双十一的购物车里装满了国人对美好生活的期待，这小小的图标承载着消费升级的宏大叙事。",
    
    "支付页面": "支付页面是交易完成的最后一步，也是整个购物体验中最具仪式感的环节。当完成支付的那一刻，购买的承诺正式生效，商品即将到来。支付页面的设计追求简洁和安全，让用户能够安心完成交易。密码、指纹、面部识别，各种验证方式保障着每一笔交易的安全。支付记录是我们消费历史的凭证，每一笔支出都记录着生活的轨迹。从现金到移动支付，支付方式的变迁折射出科技的进步和社会的发展，让交易变得越来越便捷高效。",
    
    "外卖界面": "外卖界面改变了现代人的饮食方式，让美食触手可及。忙碌的工作日里，只需轻点几下，热腾腾的美食就会送到门口。外卖平台汇聚了各种风格的餐厅和小店，让用户能够在家尝遍天下美食。外卖界面展示了琳琅满目的菜品图片，诱人的色泽和精致的摆盘让人食指大动。评价系统和配送追踪让整个外卖体验透明可控，消费者可以随时了解订单状态。外卖不仅是一种饮食方式，更是一种生活态度的体现，它让人们从繁琐的做饭劳动中解放出来，有更多时间享受生活的其他美好。",
    
    "深夜房间": "深夜房间是一个私密的空间，当万籁俱寂时，思绪开始自由飞翔。窗外的城市灯火阑珊，屋内只有微弱的台灯光芒，独自面对内心的时刻。深夜是灵感最活跃的时段，许多创意和思考都在这时涌现。深夜房间见证了无数人的孤独、思考、创作和入睡。加班的深夜、失眠的深夜、独自看书的深夜，每一种深夜都有其独特的氛围。深夜的房间是最真实的空间，没有白日的喧嚣和社交的压力，只有自己和自己的对话。",
    
    "电脑桌面": "电脑桌面是数字时代的工作台，承载着我们的工作文件和私人资料。整齐的桌面让人心情愉悦有条理，而堆满文件的桌面则诉说着忙碌的日程。桌面壁纸是我们每天第一眼看到的画面，它反映着主人的喜好和当前心境。桌面上的每一个图标都是通往某个数字空间的入口，连接着我们的工作、学习和娱乐。电脑桌面是现代人处理日常事务的中枢，从文档编辑到视频剪辑，从邮件处理到游戏娱乐，都在这个平面上展开。它见证了我们的努力和成长，存储着珍贵的工作成果。",
    
    "手机电量低": "手机电量低是数字时代的焦虑来源之一，当电量警示亮起，现代人的不安全感瞬间涌上心头。手机已经渗透到生活的方方面面，失去它就像失去了与世界的连接。电量低的提示让人匆忙寻找充电设备，也让人反思对手机的过度依赖。充电的时刻反而成了一种放空和休息的机会，让我们暂时从数字世界中抽离。手机电量低提醒我们，生活不只有屏幕里的精彩，还有现实中需要关注的人和事。",
    
    "游戏直播": "游戏直播是电竞时代的全新娱乐形式，主播通过实时视频展示自己的游戏技巧和人格魅力。观众不仅是旁观者，更是参与者，通过弹幕与主播互动，创造出独特的观看体验。游戏直播融合了竞技、娱乐和社交多重元素，满足了不同观众的需求。优秀的主播不仅是游戏高手，更是内容创作者，他们用幽默的语言和独特的风格吸引着粉丝。游戏直播让游戏从个人娱乐变成了大众文化，让更多人感受到了电竞的魅力和激情。",
    
    "地铁": "地铁是现代都市的生命线，每天承载着成千上万人的通勤梦想。在拥挤的车厢里，每个人都沉浸在自己的世界里，有的在听音乐，有的在刷手机，有的在发呆思考。地铁是一个流动的微型社会，各种各样的人在这狭小的空间里短暂相遇。地铁站是城市的重要枢纽，连接着家的温暖和工作的事业。每天的通勤之路虽然辛苦，却也给了我们沉淀和思考的时间。地铁呼啸而过，带走了无数人的梦想和期待，也带来了归家的渴望。",
    
    "咖啡店": "咖啡店是都市中的第三空间，介于家和办公室之间的温暖存在。浓郁的咖啡香气弥漫在空气中，柔和的音乐流淌在耳边，人们在这里工作、阅读或与朋友闲聊。咖啡店是灵感的温床，许多创意和想法在这里萌芽诞生。咖啡师用心制作的每一杯咖啡都是一件小小的艺术品，拉花和口感都值得细细品味。咖啡店的装修风格体现了店主的生活美学，木质的桌椅、绿植的点缀、墙上的装饰画，都让人感到放松和舒适。这里是逃离喧嚣的避风港，让人暂时放下生活的压力，享受片刻的宁静。",
    
    "快递": "快递是电商时代的物流血脉，每天数以亿计的包裹在祖国大地上流转。快递员穿梭于大街小巷，将期待的礼物送到千家万户手中。每一件快递都承载着卖家的用心和买家的期待，是连接生产和消费的桥梁。拆快递的快感是独特的消费体验，层层包装里藏着精心挑选的商品，满载着对生活的热爱。快递行业的发展改变了我们的购物方式，让天涯若比邻成为现实，也让商品流通变得更加高效便捷。",
    
    "便利店": "便利店是都市生活的补给站，二十四小时不打烊的温暖灯光照亮着夜归人的路。从早餐的三明治到深夜的泡面，从急需的日用品到随手的小零食，便利店满足了人们各种即时性的需求。便利店的货架虽然不大，却像哆啦A梦的口袋一样应有尽有。店员温暖的招呼声、自助结账的便利、店内的明亮灯光，都让人感到一种被照顾的安心感。便利店是都市人最贴心的伙伴，无论是清晨还是深夜，它总是默默守候在那里。",
    
    "镜子": "镜子是人类最忠实的伙伴，它如实反映着我们的外在形象。清晨对着镜子整理仪容，让自己以最佳状态迎接新的一天。镜子前的时光是自我审视的时刻，整理的不仅是外表，更是内心的准备。不同的镜子映照出不同的自己，试衣镜里的自信、浴室镜前的放松、化妆镜前的精致，每一面镜子都承载着不同的仪式感。镜子也是空间的魔术师，通过镜面反射可以让狭小的空间显得更加宽敞明亮。",
    
    "床": "床是我们每天生活的起点和终点，承载着人生三分之一的时光。柔软的床垫和蓬松的枕头包裹着疲惫的身体，让我们在梦乡中得到修复。卧室的床是最私密的领地，床单的颜色、枕头的软硬都体现着个人对舒适的追求。周末的上午赖在床上看书追剧，是对自己辛劳工作的最好奖赏。床见证了我们的睡眠、梦境和醒来，守护着每一个夜晚的安宁。好床配好梦，舒适的床是美好生活的基础。",
    
    "耳机": "耳机是现代人的随身避难所，戴上它就能进入只属于自己的音乐世界。通勤路上、健身房里、图书馆中，耳机隔绝了外界的喧嚣，让人沉浸在美妙的旋律里。不同类型的耳机满足着不同场景的需求，头戴式的沉浸感、入耳式的便携、骨传导的安全，每一种都是对音质和使用场景的精心考量。耳机里的音乐能抚慰心灵、激发灵感、陪伴孤独，它是我们最忠诚的伙伴，陪伴我们度过无数个平凡或特别的日子。",
    
    "办公室": "办公室是现代人实现职业价值的战场，每天在这里度过大量的清醒时光。格子间或开放办公区，每个空间都有其独特的工作氛围。办公室不仅是工作的场所，也是社交的平台，茶水间的闲聊、午餐时的交流都增进着同事间的感情。办公室的装修和设施反映着企业的文化和价值观，舒适的环境能提高工作效率，融洽的团队能带来工作的快乐。在这里，我们与同事并肩作战，为共同的目标努力，也在工作中收获友谊和成长。",
    
    "机场": "机场是通往世界的门户，承载着人们对远方的向往和归家的期待。候机大厅里人来人往，每个人都怀揣着自己的故事和目的地。登机口是一个充满仪式感的地方，踏过那道线，就意味着离开和到达。机场的登机广播、起落的飞机、熙攘的人群，共同编织着关于出发的梦想。机场也是观察社会的绝佳地点，不同阶层、不同目的的人在在这里短暂交汇。机场的免税店里陈列着世界各地的精品，提醒着人们世界的广阔和生活的丰富。",
    
    "加油站": "加油站是旅途中的能量补给站，为奔波的汽车提供继续前行的动力。便利店里温暖的灯光和便利店外的荒凉形成对比，给人一种宾至如归的感觉。加油站的工作人员在日晒雨淋中为过往车辆服务，他们的辛勤劳动保障着道路的畅通。加油站也是长途司机休息的驿站，一杯热咖啡、一包泡面，就能让人恢复精力继续上路。加油站的变迁也反映着能源行业的发展和环保意识的觉醒。",
    
    "空房间": "空房间是一个充满可能性的空间，它等待被填充、被定义、被赋予意义。空房间可以是画室、工作室、客房或者储藏室，想象力决定着它的未来。搬家后的空房间让人既感到新生的希望，也有对旧时光的留恋。空房间的寂静有一种特殊的魔力，让人的思绪可以自由飘荡。装修前的空房间是设计师的画布，等待着被勾勒出美好的轮廓。空房间也是出租屋中介给租客的第一印象，它的条件和氛围往往决定了租住的决定。",
    
    "猫": "猫是人类最古老的伴侣动物之一，它们优雅的身姿和独立的性格让人着迷。慵懒地晒着太阳、灵活地捕捉玩具、咕噜咕噜表达满足，猫的每一个动作都透着一种漫不经心的优雅。养猫人自称猫奴心甘情愿为它们铲屎喂食，只为换取那一声软糯的喵叫。猫的种类繁多，从英短的圆润到布偶的仙气，每一种都有其独特的魅力。猫是治愈系动物，它们的陪伴能够缓解压力和孤独，给人们带来无尽的欢乐。",
    
    "宠物猫": "宠物猫是家庭的重要成员，它们用独特的方式表达着对主人的爱。蜷缩在主人腿上的温暖、蹭着脚踝的亲昵、带回老鼠的礼物，猫咪用各种行为诉说着它们的感情。宠物猫的生活品质反映着主人的用心程度，从猫粮的选择到猫窝的布置，每一处细节都体现着关爱。宠物猫的健康需要定期的体检和疫苗接种，科学的喂养让它们能够陪伴主人更长时间。养宠物猫不仅是拥有一只动物，更是获得了一个会永远等待你回家的生命。",
    
    "宠物博主": "宠物博主是社交媒体上最受欢迎的内容创作者之一，他们用镜头记录着毛孩子的日常。从呆萌的睡姿到调皮的捣蛋，宠物博主们总能捕捉到最有趣的瞬间。宠物博主的内容不仅带来欢乐，也传播着科学养宠的知识和理念。优秀的宠物博主拥有庞大的粉丝群体，他们的推荐能够影响粉丝的购买决策。宠物博主们通过内容创作实现了兴趣和事业的结合，让热爱变成了职业。与宠物一起工作是一份幸福的事业，每一天都在和爱与被爱中度过。",
    
    "猫咪直播带货": "猫咪直播带货是电商时代的新兴营销模式，可爱的猫咪成为推销商品的最佳代言人。直播间里的小猫萌态可掬，吸引着观众驻足观看，同时也带动了相关商品的销量。猫咪主播不需要说话，只要展示萌态就能让消费者乖乖下单。这种模式开创了宠物经济的新赛道，也让更多铲屎官看到了宠物变现的可能。猫咪直播带货的成功证明了内容营销的无限潜力，好的内容本身就是最好的广告。",
    
    "猫窝商品": "猫窝商品是宠物市场的重要品类，从简约的纸箱到豪华的猫树应有尽有。好的猫窝应该兼顾猫咪的喜好和主人的审美，让宠物和人都满意。猫窝的材质、尺寸、款式都有讲究，需要根据猫咪的体型和主人的家居风格来选择。高端猫窝不仅仅是猫咪的休息之所，更是家居装饰的一部分，体现了主人对生活品质的追求。",
    
    "蝴蝶": "蝴蝶是自然界最美的精灵之一，它们的翅膀如艺术品般精致绚烂。从毛毛虫到蝴蝶的蜕变，象征着生命的奇迹和美丽蜕变的可能。蝴蝶在花丛中翩翩起舞的景象让人感受到大自然的生机与和谐。蝴蝶的种类繁多，不同品种有着各异的色彩和图案，是生物多样性的完美体现。蝴蝶也常出现在文学艺术作品中，象征着自由、美丽和灵魂的升华。",
    
    "蝴蝶眼妆": "蝴蝶眼妆是美妆界的一种艺术表现形式，灵感来源于蝴蝶翅膀的绚丽色彩和精妙纹路。这种眼妆通过眼影的层叠和细节的刻画，在眼睑上创造出蝴蝶振翅欲飞的效果。蝴蝶眼妆适合派对和舞台，能够让妆容成为全场焦点。美妆博主们热衷于挑战各种复杂的蝴蝶眼妆，将化妆变成了一种艺术创作。蝴蝶眼妆不仅是外在的装饰，更是内心情感的自我表达，体现出对美的大胆追求。",
    
    "美妆分享": "美妆分享是女性群体中最热门的话题之一，从口红颜色到底妆技巧，每个人都有自己的心得。美妆博主们通过视频和图文分享自己的使用体验和上妆技巧，为粉丝提供参考和灵感。美妆分享不仅限于产品推荐，更是一种生活态度的表达，展现着女性对美的追求和自我风格的探索。美妆社区是一个充满正能量的圈子，女性们互相鼓励、彼此启发，共同成长进步。",
    
    "女明星": "女明星是娱乐产业最耀眼的存在，她们以美丽、才华和魅力征服着万千观众。从红毯造型到影视作品，女明星的每一个动态都牵动着粉丝的心。女明星不仅要有出众的外貌，更需要实力派的演技或多才多艺的才华来支撑人气。她们的一举一动都受到媒体和公众的关注，这种聚光灯下的生活既光鲜亮丽也充满压力。女明星的成功往往源于多年的努力和坚持，她们的故事激励着无数年轻人追逐梦想。",
    
    "红毯直拍": "红毯直拍是娱乐圈最受关注的视觉盛宴，女明星们在这里争奇斗艳，展示各自的时尚品味和绝佳状态。闪光灯下的红毯是明星们最华丽的舞台，精心的装扮和自信的姿态在这里交汇。每一位走上红毯的明星都经过团队的精心打造，从服装到配饰，从发型到妆容，每一个细节都追求完美。红毯造型往往成为时尚的风向标，影响着大众的审美趋势。优秀的红毯直拍不仅记录了明星的美，更定格了属于那个时刻的璀璨与辉煌。",
    
    "晚礼服": "晚礼服是正式场合的着装标配，它代表着优雅、庄重和高贵。女士晚礼服的设计凝聚了设计师的心血，从剪裁到面料，从色彩到配饰，每一处都体现着品质与格调。穿上一件合适的晚礼服，女性的气质会瞬间提升，自信也会油然而生。晚礼服的选择应该与场合、身材和个人风格相匹配，才能展现出最佳效果。高级定制的晚礼服更是艺术品，每一针每一线都承载着工匠精神。",
    
    "服装设计图": "服装设计图是时尚产业的起点和灵魂，每一张图纸都承载着设计师对美的追求和创意的实现。设计师通过手绘或电脑软件将脑海中的构想转化为可视化的图纸，为后续的制版和缝制提供依据。服装设计图不仅要求准确的比例和细节，更需要传达出服装的整体感觉和穿着效果。优秀的设计图能够让人们预见成衣的模样，预判穿着后的效果，是连接创意和现实的重要桥梁。",
    
    "肖像画": "肖像画是艺术史上最古老的形式之一，通过画笔捕捉人物的神韵和气质。从文艺复兴时期的大师到当代的艺术家，无数精彩的肖像画流传于世。好的肖像画不仅追求外形的相似，更注重刻画人物的性格和内心世界。委托画师创作肖像画是一种珍贵的礼物，能够永久保存对一个人的记忆和情感。肖像画的价值在于其独特性和不可复制性，每一幅都是为特定的人创作的独一无二的作品。",
    
    "风景画": "风景画让人们能够将喜爱的自然风光带回家中，随时欣赏和回味。无论是崇山峻岭的雄伟，还是小桥流水的婉约，风景画都能将自然的美好定格在画布上。好的风景画不仅是对景色的再现，更是画家情感和审美的表达，注入了艺术家的主观感受。风景画是室内装饰的常用元素，它能够改变空间的气质，营造出宁静或热烈的氛围。收藏风景画也是一种投资，一些大师的作品在拍卖市场上价值连城。",
    
    "青金石颜料": "青金石颜料是油画中最珍贵和历史悠久的蓝色颜料之一，其鲜艳纯粹的色泽让无数画作为之增色。这种颜料来源于稀有的青金石矿石，开采和加工过程都非常困难，因此价格昂贵。文艺复兴时期，青金石颜料只用于最重要的画作部位，如圣母的袍子。青金石颜料具有极佳的稳定性和覆盖力，色彩历久弥新，不会因时间而褪色。使用青金石颜料作画本身就是一种奢侈，象征着艺术家对完美的追求。",
    
    "蛋糕": "蛋糕是甜蜜与幸福的象征，无论是生日、婚礼还是庆祝活动，蛋糕都是不可或缺的甜蜜主角。从简约的纸杯蛋糕到华丽的多层庆典蛋糕，蛋糕的种类繁多，满足着各种场合的需求。蛋糕师用巧手将面糊和奶油变成艺术品，装饰着可食用的花朵、人物或图案。品尝蛋糕不仅是味觉的享受，更是对美好时刻的庆祝。每一块蛋糕都承载着祝福和喜悦，是仪式感的重要组成部分。",
    
    "甜品店": "甜品店是甜蜜梦想的实体化空间，橱窗里陈列着各式各样的精致甜点。从法式马卡龙到日式芝士蛋糕，从意式提拉米苏到港式蛋挞，甜品店里汇聚了世界各地的甜蜜滋味。甜品店的环境通常温馨雅致，让人忍不住放慢脚步，享受一份下午茶的悠闲时光。优秀的甜品店不仅注重产品的口感，更在视觉和氛围上精益求精。甜品师们用匠心制作每一份甜品，将甜蜜传递给每一位顾客。",
    
    "咖啡拉花": "咖啡拉花是拿铁艺术的表现形式，咖啡师用牛奶在咖啡表面创造出精美的图案。一颗心、一片叶子或是一只天鹅，简单或复杂的拉花都展示着咖啡师的技艺。拉花不仅是视觉的享受，也会影响咖啡入口的口感体验。咖啡拉花需要长时间的练习和对手法的精确掌控，是一门将实用与美学完美结合的艺术。每一杯拉花咖啡都是独一无二的，即使同样的图案也会因为咖啡师的个人风格而呈现出不同的韵味。",
    
    "探店博主": "探店博主是美食文化的传播者，他们用镜头和文字记录着城市中的美味发现。从高档餐厅到街边小店，探店博主们用专业的眼光发掘隐藏的美食宝藏。探店博主的内容不仅包括食物的味道，更涵盖了环境、服务、性价比等全方位的评价。优秀的探店博主拥有敏锐的味觉和独到的见解，能够为粉丝提供有价值的消费参考。探店博主的工作让美食被发现，让好店被认可，也丰富了城市的美食文化。",
    
    "自拍打卡拍照": "自拍打卡拍照是当代年轻人的新式旅行纪念方式，不仅要拍摄美景，更要将自己融入画面，留下到此一游的证据。打卡照追求的是独特和新颖，为此人们愿意排长队、找角度、等光线，只为获得一张满意的照片。网红打卡点的兴起催生了一系列新兴产业，从摄影道具到后期滤镜，形成了完整的打卡经济产业链。自拍打卡不仅是为了记录，更是分享和展示生活的一种方式，让美好的瞬间能够被更多人看到。",
    
    "海豚": "海豚是海洋中最具智慧和亲和力的生物之一，它们聪明伶俐、与人为善的形象深入人心。海豚表演是海洋馆最受欢迎的节目之一，驯兽师与海豚的默契配合展示着人与动物和谐相处的可能。海豚的智商很高，具有复杂的社会行为和情感表达，它们之间的互动充满了温情。保护海豚、维护海洋生态，是人类不可推卸的责任。海豚的微笑是天然的，让每一个看到它的人都感受到快乐和治愈。",
    
    "海洋馆": "海洋馆是城市中的海底世界，让人们不用潜入深海就能欣赏到海洋生物的奇妙。巨大的水族箱前，人们驻足观看各色鱼群翩翩起舞，仿佛置身于梦幻的海底宫殿。海洋馆不仅提供娱乐，更是海洋科普教育的重要基地，让人们了解海洋生态的脆弱和珍贵。海洋馆的设计追求让动物生活在接近自然的环境中，这体现了人类对动物福利的重视和保护海洋的意识。",
    
    "游客拍照": "游客拍照是旅行中不可或缺的环节，定格旅途中的美好瞬间，让记忆能够被永久保存。无论是标志性的景点还是偶然发现的小众风景，游客们都想把它们收入镜头。好的游客照能够讲述一个地方的故事，传达出当时的心境和氛围。游客照的拍摄技巧也是一门学问，从构图到光线，从pose到表情，每一个细节都影响最终的效果。翻看旧时的游客照，能够瞬间把人带回那段美好的回忆中。",
    
    "旅行博主": "旅行博主是数字时代的探险家，他们用镜头和文字记录着世界各地的风土人情。旅行博主的工作不是简单的游玩，而是需要策划、拍摄、剪辑、写作，是全方位的内容创作。优秀的旅行博主能够将旅途中的所见所闻转化为引人入胜的故事，激发观众的出行欲望。旅行博主的存在让更多人看到了世界的广阔，也推动了旅游业的发展。他们是新时代的导游和意见领袖，影响着大众的出行选择。",
    
    "飞机舷窗": "飞机舷窗是万米高空欣赏世界的窗口，透过它可以看到云海、日出和城市的灯火。起飞和降落时的舷窗景色最为壮观，云层像棉花糖一样铺展在大地之上。飞机舷窗外的世界是我们日常生活中无法触及的高度和角度，这种独特的视角让人感受到自然的伟大和人类的渺小。坐在靠窗的位置是很多乘客的偏好，只为能够欣赏到那一览众山小的景致。飞机舷窗的每一次眺望，都是对远方的一次深情凝望。",
    
    "酒店房间": "酒店房间是旅途中的临时家，它的质量直接影响着旅行体验的舒适度。设计师们用心打造每一个细节，从床品的舒适度到灯光的柔和度，从隔音效果到视野景观。不同星级的酒店提供不同档次的服务和设施，但无论哪种档次，干净整洁都是最基本的保障。酒店房间也是文化的载体，从装修风格到装饰物件都能反映当地的文化特色。入住酒店的体验是多方面的综合感受，好的酒店让人宾至如归、流连忘返。",
    
    "健身房": "健身房是都市人追求健康生活的圣地，在这里汗水见证着每一份努力和坚持。健身房的器械区、跑步区、团课室满足着会员们不同的锻炼需求。专业的健身教练为会员制定科学的训练计划，帮助他们达成健身目标。健身房不仅是锻炼身体的场所，更是社交的空间，人们在这里结识志同道合的伙伴。定期健身能够带来身心的全面提升，让人在忙碌的生活中保持最佳状态。",
    
    "垃圾堆": "垃圾堆是环境问题的缩影，反映着人类活动对地球造成的影响。城市边缘的垃圾堆放场每天接收着大量的生活垃圾，如何处理这些废弃物是现代社会面临的重大挑战。垃圾分类是解决垃圾问题的有效途径，它能够提高资源的回收利用率，减少对环境的污染。垃圾堆的存在提醒着人们要反思自己的消费习惯，减少不必要的浪费，共同守护我们赖以生存的地球家园。",
    
    "跑鞋": "跑鞋是跑步运动最重要的装备，一双合适的跑鞋能够保护双脚、提升运动表现。跑鞋的设计融合了运动科技和人体工学，在缓震、支撑、透气等方面不断创新。不同类型的跑鞋适合不同的跑步场景，从马拉松到短跑，从公路到越野，需要选择相应的专业鞋款。跑鞋也是时尚单品，很多品牌推出的限量款式受到潮人追捧。穿上心仪的跑鞋，迈开步伐奔向健康，是很多人的生活习惯。",
    
    "健身博主": "健身博主是健康生活方式的传播者，他们通过社交媒体分享健身知识和经验。健身博主的内容包括训练动作示范、饮食建议、装备测评等全方位的信息。优秀的健身博主本身就是最好的代言人，他们的变化和成果是最有说服力的证明。健身博主与粉丝之间建立了信任关系，博主的推荐往往能够影响粉丝的消费决策。健身博主的工作激励着更多人开始健身，推动了全民健康事业的发展。",
    
    "健身自拍": "健身自拍记录着身体的变化和训练的成果，是健身者自我激励的方式。健身自拍通常会摆出特定的姿势，以便更清晰地展示肌肉线条和体态变化。健身自拍的意义不仅在于展示成果，更是对自己坚持的一种肯定和奖励。很多健身爱好者会定期自拍进行对比，见证着自己的蜕变和成长。健身自拍也是健身社区互动的重要内容，大家互相鼓励、彼此点赞，共同进步。",
    
    "减肥餐": "减肥餐是控制热量摄入的重要手段，专为需要控制体重的人群设计。减肥餐讲求营养均衡、热量可控，在保证身体健康的前提下减少多余脂肪的摄入。减肥餐的食材选择丰富多样，鸡胸肉、蔬菜沙拉、粗粮主食都是常见选项。减肥餐的烹饪方式通常以蒸、煮、烤为主，避免过多油脂的使用。自己制作减肥餐是一种健康的生活态度，它让人更加关注食物的营养成分和热量。",
    
    "卡路里表": "卡路里表是控制饮食的重要参考工具，标注着各种食物的热量值。了解食物的卡路里含量能够帮助人们合理规划每日摄入，是科学减肥的基础。卡路里表不仅是减肥人群的工具，对健康饮食有兴趣的人都可以参考。现代人越来越关注饮食的营养成分，卡路里表的普及反映了这种健康意识的觉醒。",
    
    "体重秤": "体重秤是测量体重的工具，是监控体重变化的重要设备。智能体重秤不仅能测量体重，还能分析体脂率、肌肉量等多项身体指标。定期称重能够帮助人们了解自己的身体状况，及时调整饮食和运动计划。体重秤的数字不是评判标准，它只是参考数据之一，更重要的是身体的感受和整体健康状况。",

function initDynamicText(imageName) {
    generatedText = [];
    textReplaceTimers = [];
    
    let fullText = generateTextBasedOnImage(imageName);
    let words = fullText.split(/(?=[\u4e00-\u9fa5a-zA-Z])/).filter(w => w.trim() !== '');
    
    for (let word of words) {
        if (/[\u4e00-\u9fa5]/.test(word)) {
            let matches = word.match(/[\u4e00-\u9fa5]/g);
            if (matches) {
                for (let char of matches) {
                    generatedText.push({
                        original: char,
                        current: char,
                        isChinese: true,
                        x: 0,
                        y: 0
                    });
                    let translationsList = translations[char];
                    if (translationsList && translationsList.length > 0) {
                        let enTranslation = translationsList[0];
                        generatedText.push({
                            original: enTranslation,
                            current: enTranslation,
                            isChinese: false,
                            isEnglish: true, // 标记英文
                            x: 0,
                            y: 0
                        });
                    }
                }
            }
            let nonChinese = word.replace(/[\u4e00-\u9fa5]/g, '');
            if (nonChinese) {
                generatedText.push({
                    original: nonChinese,
                    current: nonChinese,
                    isChinese: false,
                    x: 0,
                    y: 0
                });
            }
        } else {
            generatedText.push({
                original: word,
                current: word,
                isChinese: false,
                x: 0,
                y: 0
            });
        }
    }
    
    startTextReplacement();
}

function startTextReplacement() {
    textReplaceTimers.forEach(t => clearInterval(t));
    textReplaceTimers = [];
    
    generatedText.forEach((item, index) => {
        if (item.isChinese) {
            let timer = setInterval(() => {
                if (random(1) < 0.7) {
                    let replacements = translations[item.original];
                    if (replacements && replacements.length > 0) {
                        let randIdx = floor(random(replacements.length));
                        item.current = replacements[randIdx];
                        // 标记是否是英文（索引0是英文）
                        item.isEnglish = (randIdx === 0);
                    } else {
                        item.current = item.original;
                        item.isEnglish = false;
                    }
                } else {
                    item.current = item.original;
                    item.isEnglish = false;
                }
            }, 1000 / 15);
            textReplaceTimers.push(timer);
        }
    });
}

function stopTextReplacement() {
    textReplaceTimers.forEach(t => clearInterval(t));
    textReplaceTimers = [];
}

function drawBackgroundText() {
    if (!isPushActive || generatedText.length === 0) return;
    
    textAlign(LEFT, TOP);
    
    let lineHeight = 42; // 稍微增加行高
    let currentX = 20;
    let currentY = 20;
    let baseSize = 32;
    let boldSize = 38; // 放大的尺寸
    
    // 重复文本直到填满屏幕
    let textIndex = 0;
    let repeatCount = 3; // 重复3次
    
    for (let r = 0; r < repeatCount && currentY < height - lineHeight; r++) {
        for (let item of generatedText) {
            if (currentX > width - 60) {
                currentX = 20;
                currentY += lineHeight;
                if (currentY > height - lineHeight) break;
            }
            
            // 根据类型设置样式
            if (item.isChinese || item.isEnglish) {
                // 中文或英文：放大加粗
                fill(255);
                textSize(boldSize);
                textStyle(BOLD);
                text(item.current, currentX, currentY);
                currentX += textWidth(item.current);
                textStyle(NORMAL); // 恢复正常样式
            } else {
                // 其他语言：保持原样
                fill(255);
                textSize(baseSize);
                text(item.current, currentX, currentY);
                currentX += textWidth(item.current);
            }
        }
        if (currentY > height - lineHeight) break;
    }
    
    textAlign(CENTER, CENTER);
}
