// ----- 卫星浮动核心 -----
function initPushFloats(count) {
    pushFloats = [];
    for (let i = 0; i < count; i++) {
        pushFloats.push({
            offsetX: 0,
            offsetY: 0,
            phaseX: random(TWO_PI),
            phaseY: random(TWO_PI),
            speedX: random(1.0, 3.0),
            speedY: random(0.6, 2.0),
            ampX: random(12, 22) * screenScale,
            ampY: random(10, 20) * screenScale
        });
    }
}

function updatePushFloatsOffsets(nowTime) {
    if (!isPushActive) return;
    let count = pushItems.length;
    if (pushFloats.length !== count) initPushFloats(count);
    for (let i = 0; i < count; i++) {
        let f = pushFloats[i];
        f.offsetX = sin(nowTime * 0.005 * f.speedX + f.phaseX) * f.ampX;
        f.offsetY = cos(nowTime * 0.0044 * f.speedY + f.phaseY) * f.ampY;
        f.offsetX += sin(nowTime * 0.0024) * 2 * screenScale;
        f.offsetY += cos(nowTime * 0.003 + i) * 2 * screenScale;
    }
}

function initDeltaAngles(count) {
    deltaAngles = new Array(count).fill(0);
    deltaAngleVel = new Array(count).fill(0);
    deltaAngleState = new Array(count).fill(0);
}

// 核心渐进式轨道躲避 (动态参数随着 evolutionProgress 变化)
function updateOrbitEvasion() {
    if (!isPushActive) return;
    let count = pushItems.length;
    if (count === 0) return;
    if (deltaAngles.length !== count) initDeltaAngles(count);
    
    let pushCenterX = viewerX + viewerW/2;
    let pushCenterY = viewerY + viewerH/2;
    let startAngle = 0;
    let angleRange = PI;
    let baseAngles = [];
    for (let i = 0; i < count; i++) {
        let t = i / (count - 1);
        baseAngles[i] = startAngle + t * angleRange + pushRotation;
    }
    
    // 获取当前动态参数
    let curTriggerDist = getCurrentTriggerDist();
    let curAngularForce = getCurrentAngularForce();
    let curMaxDelta = getCurrentMaxDelta();
    let curRestore = getCurrentRestoreForce();
    let curDamp = getCurrentDamping();
    
    let anyEvade = false;
    for (let i = 0; i < count; i++) {
        let finalAngle = baseAngles[i] + deltaAngles[i];
        let baseX = pushCenterX + cos(finalAngle) * pushEllipseA;
        let baseY = pushCenterY + sin(finalAngle) * pushEllipseB;
        let floatX = (pushFloats[i] && pushFloats[i].offsetX) ? pushFloats[i].offsetX : 0;
        let floatY = (pushFloats[i] && pushFloats[i].offsetY) ? pushFloats[i].offsetY : 0;
        let satX = baseX + floatX;
        let satY = baseY + floatY;
        let d = dist(canvasMouseX, canvasMouseY, satX, satY);
        
        if (d < curTriggerDist) {
            anyEvade = true;
            let tangentAngle = finalAngle + HALF_PI;
            let dirX = cos(tangentAngle);
            let dirY = sin(tangentAngle);
            let toMouseX = canvasMouseX - satX;
            let toMouseY = canvasMouseY - satY;
            let proj = toMouseX * dirX + toMouseY * dirY;
            let evadeSign = (proj > 0) ? -1 : 1;
            let forceFactor = map(d, 0, curTriggerDist, 1.6, 0.3);
            forceFactor = constrain(forceFactor, 0.4, 1.7);
            let angularAcc = evadeSign * curAngularForce * forceFactor;
            deltaAngleVel[i] += angularAcc;
            let maxVel = 0.06 + evolutionProgress * 0.12;
            deltaAngleVel[i] = constrain(deltaAngleVel[i], -maxVel, maxVel);
            deltaAngleState[i] = 1;
        } else {
            if (deltaAngleState[i] === 1 || Math.abs(deltaAngles[i]) > 0.02) {
                deltaAngleVel[i] += -deltaAngles[i] * curRestore;
                deltaAngleState[i] = 2;
            } else {
                deltaAngleState[i] = 0;
            }
        }
        
        deltaAngleVel[i] *= curDamp;
        deltaAngles[i] += deltaAngleVel[i];
        deltaAngles[i] = constrain(deltaAngles[i], -curMaxDelta, curMaxDelta);
        
        if (deltaAngleState[i] === 2 && Math.abs(deltaAngles[i]) < 0.008 && Math.abs(deltaAngleVel[i]) < 0.002) {
            deltaAngles[i] = 0;
            deltaAngleVel[i] = 0;
            deltaAngleState[i] = 0;
        }
    }
    // 超高狂乱度时增加随机躁动
    if (evolutionProgress > 0.7 && !anyEvade && random(1) < 0.02) {
        for (let i = 0; i < count; i++) {
            if (random(1) < 0.25) deltaAngleVel[i] += (random(-1,1) * 0.008 * evolutionProgress);
        }
    }
}

// 更新卫星最终位置 (基准 + 浮动 + 轨道躲避偏移)
function updatePushBubblePositions() {
    if (!isPushActive) return;
    let count = pushItems.length;
    if (count === 0) return;
    let pushCenterX = viewerX + viewerW/2;
    let pushCenterY = viewerY + viewerH/2;
    let startAngle = 0;
    let angleRange = PI;
    if (pushFloats.length !== count) initPushFloats(count);
    if (deltaAngles.length !== count) initDeltaAngles(count);
    
    pushBubbleX = [];
    pushBubbleY = [];
    for (let i = 0; i < count; i++) {
        let t = i / (count - 1);
        let baseAngle = startAngle + t * angleRange + pushRotation;
        let finalAngle = baseAngle + (deltaAngles[i] || 0);
        let baseX = pushCenterX + cos(finalAngle) * pushEllipseA * screenScale;
        let baseY = pushCenterY + sin(finalAngle) * pushEllipseB * screenScale;
        let floatX = (pushFloats[i] && pushFloats[i].offsetX) ? pushFloats[i].offsetX : 0;
        let floatY = (pushFloats[i] && pushFloats[i].offsetY) ? pushFloats[i].offsetY : 0;
        pushBubbleX[i] = baseX + floatX;
        pushBubbleY[i] = baseY + floatY;
    }
}

function generatePushList(centerId) {
    // 使用永久替换后的ID作为逻辑中心
    let actualCenterId = tempImageReplace[centerId] !== undefined ? tempImageReplace[centerId] : centerId;
    let centerName = folderNames[actualCenterId];
    let rule = pushRules[centerName] || [];
    
    let pushItems = [];
    
    let vertical = rule.slice(0, 2);
    let horizontal = rule.slice(2, 4);
    let randomItem = rule[4];
    
    for (let i = 0; i < vertical.length; i++) {
        let name = vertical[i];
        if (nameToId[name] !== undefined && nameToId[name] !== centerId) {
            pushItems.push(nameToId[name]);
        }
    }
    
    for (let i = 0; i < horizontal.length; i++) {
        let name = horizontal[i];
        if (nameToId[name] !== undefined && nameToId[name] !== centerId && pushItems.indexOf(nameToId[name]) === -1) {
            pushItems.push(nameToId[name]);
        }
    }
    
    if (randomItem && nameToId[randomItem] !== undefined && nameToId[randomItem] !== centerId && pushItems.indexOf(nameToId[randomItem]) === -1) {
        pushItems.push(nameToId[randomItem]);
    }
    
    while (pushItems.length < 5) {
        let randId = floor(random(totalRooms));
        if (randId !== centerId && pushItems.indexOf(randId) === -1) {
            pushItems.push(randId);
        }
    }
    
    return pushItems.slice(0, 5);
}

function activatePushLayer(centerId) {
    // 【绝对保护机制】只有明确点击过bookcase后才能激活推送
    // 如果hasClickedBookcase为false，绝对不允许激活推送
    if (!hasClickedBookcase) {
        return; // 直接返回，不激活推送层
    }
    
    // 如果isMainGameStarted为false，说明不是从正常游戏流程来的，也要拦截
    if (!isMainGameStarted) {
        return;
    }
    
    // 如果处于选择页面阶段，绝对不允许激活推送
    if (isSelectionPhase) {
        return;
    }
    
    // 所有安全检查通过，允许激活推送层
    isPushActive = true;
    pushCenterId = centerId;
    
    // 【重要】只在点击不同的bookcase时，清除之前的临时图片替换
    // 如果点击同一个bookcase，保持替换状态
    if (lastClickedBookcaseId !== -1 && lastClickedBookcaseId !== centerId) {
        tempImageReplace = {};
        tempTitleReplace = {};
    }
    // 更新上次点击的bookcase ID
    lastClickedBookcaseId = centerId;
    
    // 更新滚动条：隐藏主页面滚动条，显示推送页面滚动条
    if (mainScrollBar) mainScrollBar.style.display = 'none';
    if (pushScrollBar) pushScrollBar.style.display = 'flex';
    
    // 每次点击都记录，不管是否重复
    clickHistory.push(centerId);
    sessionStorage.setItem('clickHistory', JSON.stringify(clickHistory));
    
    // 添加链条关系
    if (clickHistory.length > 1) {
        let prevId = clickHistory[clickHistory.length - 2];
        let relation = analyzeChainRelation(prevId, centerId);
        historyChainRelations.push(relation);
    }
    
    let oldPositions = {};
    for (let i = 0; i < pushItems.length; i++) {
        oldPositions[pushItems[i]] = {
            x: pushBubbleX[i],
            y: pushBubbleY[i],
            float: pushFloats[i],
            deltaAngle: deltaAngles[i],
            deltaAngleVel: deltaAngleVel[i],
            deltaAngleState: deltaAngleState[i]
        };
    }
    
    pushItems = generatePushList(centerId);
    
    pushBubbleX = [];
    pushBubbleY = [];
    pushFloats = [];
    deltaAngles = [];
    deltaAngleVel = [];
    deltaAngleState = [];
    
    initPushFloats(pushItems.length);
    initDeltaAngles(pushItems.length);
    updatePushBubblePositions();
    
    for (let i = 0; i < pushItems.length; i++) {
        if (oldPositions[pushItems[i]]) {
            pushBubbleX[i] = oldPositions[pushItems[i]].x;
            pushBubbleY[i] = oldPositions[pushItems[i]].y;
            pushFloats[i] = oldPositions[pushItems[i]].float;
            deltaAngles[i] = oldPositions[pushItems[i]].deltaAngle;
            deltaAngleVel[i] = oldPositions[pushItems[i]].deltaAngleVel;
            deltaAngleState[i] = oldPositions[pushItems[i]].deltaAngleState;
        }
    }
    
    initDynamicText(folderNames[centerId]);
}

    isTransitioning = true;

// 全局变量：保存转换后的鼠标坐标
let canvasMouseX = 0;
let canvasMouseY = 0;

function draw() {
    floatTime += deltaTime || 16;
    
    // 保存并转换鼠标坐标以适应CSS旋转
    let coords = transformMouseCoords(mouseX, mouseY);
    canvasMouseX = coords.x;
    canvasMouseY = coords.y;
    
    // 更新滚动声音状态
    updateScrollSound();
    
    // 根据页面状态显示/隐藏滚动条
    if (isSelectionPhase || isEndingPhaseActive) {
        // 选择页面和结局页面：隐藏所有滚动条
        if (mainScrollBar) mainScrollBar.style.display = 'none';
        if (pushScrollBar) pushScrollBar.style.display = 'none';
    } else if (isPushActive) {
        // 推送页面：显示推送滚动条，隐藏主滚动条
        if (mainScrollBar) mainScrollBar.style.display = 'none';
        if (pushScrollBar) pushScrollBar.style.display = 'flex';
    } else if (isMainGameStarted) {
        // 主80个bookcase页面：显示主滚动条，隐藏推送滚动条
        if (mainScrollBar) mainScrollBar.style.display = 'flex';
        if (pushScrollBar) pushScrollBar.style.display = 'none';
    }
    
    // 如果处于选择页面阶段，绘制选择页面
    if (isSelectionPhase) {
        // 【绝对保护】选择页面阶段，确保currentImage和isPushActive为false
        currentImage = null;
        isViewerOpen = false;
        isPushActive = false;
        drawSelectionPage();
        return; // 跳过主场景的绘制
    }
    
    // 更新自动滚动（即便是主游戏还没开始也允许滚动到目标位置
    if (autoScrollTargetId !== -1) {
        updateAutoScroll();
    }
    
    background(30, 30, 40);
    
    // 如果主游戏还没开始，只绘制静态显示80个bookcase页面，不运行其他逻辑
    if (!isMainGameStarted) {
        // 主转轮旋转（允许滚动）
        // 添加自动旋转（当用户没有手动操作时）
        if (isAutoRotating && abs(rotationVelocity) < 0.01) {
            rotationVelocity = autoRotateSpeed;
        }
        currentRotation += rotationVelocity;
        rotationVelocity *= rotationFriction;
        updateBubblePositions();
        
        // 绘制主转轮背景轨道
        push();
        noFill();
        stroke(70, 70, 90);
        strokeWeight(1.5);
        ellipse(centerX, centerY, ellipseA * 2, ellipseB * 2);
        fill(80, 80, 100);
        noStroke();
        ellipse(centerX, centerY, 25, 25);
        fill(120, 120, 140);
        ellipse(centerX, centerY, 15, 15);
        stroke(60, 60, 80);
        strokeWeight(1);
        for (let i = 0; i < totalRooms; i++) line(centerX, centerY, bubbleX[i], bubbleY[i]);
        pop();
        
        // 深度排序后绘制书架
        let indices = Array.from({length: totalRooms}, (_, i) => i);
        indices.sort((a,b) => bubbleY[b] - bubbleY[a]);
        for (let i of indices) {
            let floatX = sin(floatTime * 0.003 * roomFloats[i].speedX + roomFloats[i].phaseX) * roomFloats[i].ampX;
            let floatY = cos(floatTime * 0.0024 * roomFloats[i].speedY + roomFloats[i].phaseY) * roomFloats[i].ampY;
            drawRoom(i, bubbleX[i] + floatX, bubbleY[i] + floatY);
        }

        fill(255);
        textSize(28);
        text("“%&* Library", width/2, 45);
        textSize(14);

        text("点击书架开始游戏 Click a bookshelf to start", width/2, 80);
        textSize(12);
        fill(255);
        text("打开声音体验更佳 Turn on sound for a better experience", width/2, 105);
        pop(); // 恢复坐标变换
        return; // 只绘制静态bookcase页面，不运行其他主游戏逻辑
    }
    
    // glitch 延迟翻转逻辑保持不变
    if (pendingFlip && millis() >= pendingFlipEndTime) {
        pendingFlip = false;
    }
    if (pendingFlip && !isGlitching && millis() < pendingFlipEndTime) {
        isGlitching = true;
        glitchEffectType = 8;
        glitchEndTime = pendingFlipEndTime;
        pendingFlip = false;
        applyCSSGlitch(8);
        statusMessage = "⚠️ LATENT FLIP ACTIVATED!";
        statusColor = [255, 100, 100];
    }
    
    if (isGlitching && millis() >= glitchEndTime) {
        exitGlitchMode();

    // 主转轮旋转
    currentRotation += rotationVelocity;
    rotationVelocity *= rotationFriction;
    updateBubblePositions();
    
    // 推送层旋转和浮动更新
    if (isPushActive && isViewerOpen && !isTransitioning) {
        pushRotation += pushRotationVelocity;
        pushRotationVelocity *= rotationFriction;
        updatePushFloatsOffsets(floatTime);

        drawRoom(i, bubbleX[i] + floatX, bubbleY[i] + floatY);

    }

    }

        text(remaining + "." + remainMs + "s", width - 30 * screenScale, 55 * screenScale);
    }
    
    // 更新和绘制点击粒子雨
    for (let i = clickParticles.length - 1; i >= 0; i--) {
        let p = clickParticles[i];
        
        // 更新粒子（与开屏动画一致）
        p.vx *= 0.99;
        p.x += p.vx;
        p.y += p.vy;
        p.vy += CLICK_GRAVITY;
        p.life -= 0.015;
        
        // 更新拖尾
        p.trail.unshift({x: p.x, y: p.y, letter: p.letter});
        if (p.trail.length > p.maxTrailLen) {
            p.trail.pop();
        }
        
        // 绘制粒子
        if (p.life > 0) {
            // 绘制拖尾（与开屏动画一致）
            for (let j = 0; j < p.trail.length; j++) {
                let t = p.trail[j];
                let alphaFactor = (p.trail.length - j) / p.trail.length;
                let trailAlpha = 0.2 + alphaFactor * 0.55;
                
                push();
                translate(t.x, t.y + p.size / 3);
                textFont('Courier New');
                textSize(p.size);
                textAlign(LEFT, TOP);
                fill(p.trailColor[0], p.trailColor[1], p.trailColor[2], trailAlpha * 255);
                noStroke();
                text(t.letter, 0, 0);
                pop();
            }
            
            // 绘制主粒子（白色带阴影，与开屏动画一致）
            push();
            translate(p.x, p.y + p.size / 3);
            textFont('Courier New');
            textSize(p.size);
            textAlign(LEFT, TOP);
            drawingContext.shadowBlur = 6;
            drawingContext.shadowColor = "rgba(255,255,255,0.5)";
            fill(255, 255, 255);
            noStroke();
            text(p.letter, 0, 0);
            drawingContext.shadowBlur = 0;
            pop();
        } else {
            // 移除死亡粒子
            clickParticles.splice(i, 1);
        }
    }
}

function drawImageViewerWithPush() {

                image(currentImage, random(-10, 10), 0);
                drawingContext.globalCompositeOperation = 'source-over';
                noTint();
            }

    let blackH = vh - 130 * screenScale;

    let blackY = vy + 70 * screenScale;

    noStroke();
    rect(blackX, blackY, blackW, blackH, 10 * screenScale);
    
    if (isTransitioning && transitionFromImage) {
        let progress = constrain((millis() - transitionStartTime) / transitionDuration, 0, 1);
        let easeOut = 1 - pow(1 - progress, 3);
        let displayW = blackW - 40 * screenScale;
        let displayH = blackH - 40 * screenScale;
        let ratio = min(displayW / transitionFromImage.width, displayH / transitionFromImage.height);
        let finalW = transitionFromImage.width * ratio;
        let finalH = transitionFromImage.height * ratio;
        let imgX = blackX + (blackW - finalW) / 2;
        let imgY = blackY + (blackH - finalH) / 2;
        let scaleVal = 1 - easeOut * 0.5;
        let scaledW = finalW * scaleVal;
        let scaledH = finalH * scaleVal;
        let scaledX = imgX + (finalW - scaledW) / 2;
        let scaledY = imgY + (finalH - scaledH) / 2;
        push();
        translate(scaledX + scaledW/2, scaledY + scaledH/2);
        image(transitionFromImage, -scaledW/2, -scaledH/2, scaledW, scaledH);
        pop();
        if (progress >= 1) {
            isTransitioning = false;

            currentImageId = transitionToId;
            activatePushLayer(transitionToId);
            transitionFromImage = null;
        }
    } else if (currentImage) {
        let displayW = blackW - 40 * screenScale;
        let displayH = blackH - 40 * screenScale;
        
        if (isVideoPlaying) {
            let videoSource = bookcaseToVideoMap[currentImageId];
            let video = videoSource ? videoElementsBySource[videoSource] : null;

            if (videoSource) {
                console.log('[VIDEO DEBUG] Main viewer - videoSource:', videoSource, 'video exists:', !!video, 'videoElementsBySource keys:', Object.keys(videoElementsBySource));
            } else {
                console.log('[VIDEO DEBUG] Main viewer - no videoSource for currentImageId:', currentImageId, 'bookcaseToVideoMap:', bookcaseToVideoMap);
            }
            console.log('[VIDEO DEBUG] Main viewer - currentImageId:', currentImageId, 'videoSource:', videoSource, 'video:', video ? 'exists' : 'null', 'currentImage:', currentImage ? 'exists' : 'null');
            if (video && video.loadedmetadata) {
                let mainSize = min(displayW, displayH) * 2;
                let imgX = blackX + (blackW - mainSize) / 2;
                let imgY = blackY + (blackH - mainSize) / 2;
                
                fill(0, 0, 0, 230);
                noStroke();
                rect(blackX, blackY, blackW, blackH, 10 * screenScale);
                
                push();
                let clipX = blackX + 5 * screenScale;
                let clipY = blackY + 5 * screenScale;
                let clipW = blackW - 10 * screenScale;
                let clipH = blackH - 10 * screenScale;
                drawingContext.save();
                drawingContext.beginPath();
                drawingContext.rect(clipX, clipY, clipW, clipH);
                drawingContext.clip();
                
                image(video, imgX, imgY, mainSize, mainSize);
                
                drawingContext.restore();
                pop();
                
                stroke(isGlitching ? [220,70,70] : [110, 75, 45]);
                strokeWeight(3 * screenScale);
                noFill();
                rect(blackX, blackY, blackW, blackH, 10 * screenScale);
            } else {
                console.log('[VIDEO DEBUG] Main viewer - showing original image');
                if (currentImage) {
                    let ratio = min(displayW / currentImage.width, displayH / currentImage.height);
                    let finalW = currentImage.width * ratio;
                    let finalH = currentImage.height * ratio;
                    let imgX = blackX + (blackW - finalW) / 2;
                    let imgY = blackY + (blackH - finalH) / 2;
                    image(currentImage, imgX, imgY, finalW, finalH);
                } else {
                    console.log('[VIDEO ERROR] Main viewer - currentImage is null!');
                }
            }
        } else {
            // 正常情况：显示图片（考虑永久替换）
            console.log('[VIDEO DEBUG] Main viewer - normal mode, showing image');
            let displayId = tempImageReplace[currentImageId] !== undefined ? tempImageReplace[currentImageId] : currentImageId;
            let displayImage = correctImages[displayId];
            if (displayImage) {
                let ratio = min(displayW / displayImage.width, displayH / displayImage.height);
                let finalW = displayImage.width * ratio;
                let finalH = displayImage.height * ratio;
                let imgX = blackX + (blackW - finalW) / 2;
                let imgY = blackY + (blackH - finalH) / 2;
                image(displayImage, imgX, imgY, finalW, finalH);
            }
        }
    }
    
    fill(255);
    textSize(22 * screenScale);
    text(currentTitle, vx+vw/2, vy+35 * screenScale);
    
    if (isGlitching) {
        fill(255, 100, 100);
        textSize(14 * screenScale);
        text("⚠️ GLITCH ⚠️", vx+vw/2, vy+vh-25 * screenScale);
    }
    
    fill(80,70,100);
    noStroke();
    rect(vx+vw-45, vy+15, 30, 30, 5);
    fill(255);
    textSize(20);
    text("X", vx+vw-30, vy+35);
    
    if (!isTransitioning && isPushActive && pushItems.length > 0) {
        for (let i = 0; i < pushItems.length; i++) {
            if (pushBubbleX[i] !== undefined && pushBubbleY[i] !== undefined) {
                drawPushRoom(pushItems[i], pushBubbleX[i], pushBubbleY[i]);
            }
        }
    }
}

// glitch 样式应用
function applyCSSGlitch(type) {
    let glitchClass = "";
    switch(type) {
        case 1: glitchClass = "glitch-invert"; break;
        case 2: glitchClass = "glitch-pixelate"; break;
        case 3: glitchClass = "glitch-tear"; break;
        case 4: glitchClass = "glitch-wave"; break;
        case 5: glitchClass = "glitch-flash"; break;
        case 6: glitchClass = "glitch-triple"; break;
        case 7: glitchClass = "glitch-rgb"; break;
        case 8: glitchClass = "glitch-flip"; break;
        case 9: glitchClass = "glitch-shake"; break;
        case 10: glitchClass = "glitch-zoom"; break;
        case 11: glitchClass = "glitch-rainbow"; break;
        case 12: glitchClass = "glitch-bands"; break;
        default: return;
    }
    currentGlitchClass = glitchClass;
    let canvas = document.querySelector('canvas');
    canvas.classList.add(glitchClass);
    if (type === 2) {
        canvas.style.transform = 'scale(0.5)';
        setTimeout(() => { if (isGlitching) canvas.style.transform = ''; }, glitchEndTime - millis());
    }
}
function clearCSSGlitch() { let c=document.querySelector('canvas'); if(currentGlitchClass&&c.classList.contains(currentGlitchClass))c.classList.remove(currentGlitchClass); c.style.transform=''; currentGlitchClass=""; }
function mousePressed() {
    // 用户点击时停止自动旋转
    isAutoRotating = false;
    rotationVelocity = 0;
    
    // 生成点击粒子雨（与开屏动画一致）
    let particleCount = floor(random(3, 7)); // 3-6个粒子
    for (let i = 0; i < particleCount; i++) {
        let pSize = random(7, 15); // 与开屏动画一致的大小范围
        let pVy = pSize * 0.24 + random(0.3, 1.1); // 与开屏动画一致的初始速度
        let trailColorIndex = floor(random(CLICK_TRAIL_COLORS.length));
        clickParticles.push({
            x: canvasMouseX + random(-20, 20),
            y: canvasMouseY + random(-20, 20),
            vy: pVy,
            vx: random(-0.5, 0.5), // 与开屏动画一致
            letter: ALPHABET[floor(random(ALPHABET.length))],
            size: pSize,
            life: 1.0,
            color: [255, 255, 255], // 主粒子白色
            trail: [], // 拖尾数组
            trailColor: CLICK_TRAIL_COLORS[trailColorIndex],
            maxTrailLen: floor(random(5, 9)) // 拖尾长度5-8帧
        });
    }
    
    // 如果在结局阶段（phase >= 2），生成标题掉落粒子
    if (isEndingActive && endingPhase >= 2) {
        let titles = [displayEndingTitle1, displayEndingTitle2];
        for (let i = 0; i < titles.length; i++) {
            // 检查是否超过上限50个，如果超过则移除最早的
            if (endingTitleParticles.length >= 50) {
                endingTitleParticles.shift(); // 移除数组第一个元素（最早添加的）
            }
            
            let titleText = titles[i];
            // 测量标题宽度
            textFont('monospace');
            textSize(36 * screenScale);
            let titleWidth = textWidth(titleText);
            
            endingTitleParticles.push({
                text: titleText,
                x: canvasMouseX + random(-50, 50),
                y: canvasMouseY + random(-30, 30),
                vx: random(-2, 2),
                vy: random(-5, 0), // 向上或向下初始速度
                ay: 0.5 * screenScale, // 重力加速度
                angle: 0,
                rotSpeed: random(-5, 5), // 随机旋转速度
                bounceCount: 0,
                maxBounces: 2,
                width: titleWidth,
                opacity: 255
            });
        }
    }
    
    // 如果处于结局阶段，检测返回按钮点击
    if (isEndingActive && window.endingBtnX !== undefined) {
        if (canvasMouseX >= window.endingBtnX && 
            canvasMouseX <= window.endingBtnX + window.endingBtnW && 
            canvasMouseY >= window.endingBtnY && 
            canvasMouseY <= window.endingBtnY + window.endingBtnH) {
            resetGame();
            return;
        }
    }
    
    // 如果处于选择页面阶段，处理选择页面的点击
    if (isSelectionPhase) {
        handleSelectionClick();
        return;
    }
    
    if (currentImage && !isTransitioning) {
        let vw = min(700 * screenScale, width-40);
        let vh = min(500 * screenScale, height-100);
        let vx = (width - vw) / 2;
        let vy = (height - vh) / 2;
        let cx = vx+vw-45, cy = vy+15;
        let cw = 30, ch = 30;
        if (canvasMouseX > cx && canvasMouseX < cx+cw && canvasMouseY > cy && canvasMouseY < cy+ch) {
            // 如果正在播放视频，先结束视频序列
            if (isVideoPlaying) {
                endVideoSequence();
                return;
            }
            // 如果推送层激活，只关闭推送层，返回80个bookcase页面
            if (isPushActive) {
                deactivatePushLayer();
                return;
            } else {
                // 否则关闭整个查看器
                closeImageViewer();
                return;
            }
        }
        if (isPushActive) {
            if (!hasClickedBookcase) {
                return; // 条件放在最前面：只有点击过bookcase才能继续
            }
            for (let i = 0; i < pushItems.length; i++) {
                if (pushBubbleX[i] !== undefined && pushBubbleY[i] !== undefined) {
                    let d = dist(canvasMouseX, canvasMouseY, pushBubbleX[i], pushBubbleY[i]);
                    let clickRadius = 105 * screenScale;
                    if (d < clickRadius) {
                        let targetId = pushItems[i];
                        
                        // 【重要】只在点击不同的bookcase时，清除之前的临时图片替换
                        // 如果点击同一个bookcase，保持替换状态
                        if (lastClickedBookcaseId !== -1 && lastClickedBookcaseId !== targetId) {
                            tempImageReplace = {};
                            tempTitleReplace = {};
                        }
                        // 更新上次点击的bookcase ID
                        lastClickedBookcaseId = targetId;
                        
                        clickCounts[targetId]++;
                        pushClickSuccess++;
                        updateChaosEvolution();
                        
                        if (pushClickSuccess >= 12) {
                            let extraClicks = pushClickSuccess - 12;
                            let triggerProb = min(0.3 + extraClicks * 0.3, 1.0);
                            if (random(1) < triggerProb) {
                                startVideoSequence();
                                return;
                            }
                        }
                        
                        checkAndTriggerGlitch();
                        
                        // 检查是否已经临时替换过
                        let displayPushId = tempImageReplace[targetId] !== undefined ? tempImageReplace[targetId] : targetId;
                        let displayPushTitle = tempTitleReplace[targetId] || (folderNames[targetId] + " " + getEnglish(folderNames[targetId]));
                        
                        // 如果当前发生故障且未被临时替换过，则进行临时替换
                        if (isGlitching && random(1) < 0.9 && tempImageReplace[targetId] === undefined) {
                            let other = []; for(let j=0;j<totalRooms;j++)if(j!==targetId) other.push(j);
                            let randIdx = other[floor(random(other.length))];
                            // 临时保存替换（点击新bookcase时会被清除）
                            tempImageReplace[targetId] = randIdx;
                            tempTitleReplace[targetId] = folderNames[targetId] + " (WRONG!) " + getEnglish(folderNames[targetId]);
                            // 更新显示
                            displayPushId = randIdx;
                            displayPushTitle = tempTitleReplace[targetId];
                        }
                        
                        currentImage = correctImages[displayPushId];
                        currentTitle = displayPushTitle;
                        pushClickCount++; // 增加推送点击计数
                        startTransition(targetId);
                        return;
                    }
                }
            }
        }
        return;
    }
    if (!isTransitioning) {
        // 【绝对保护】如果仍在选择页面阶段，绝对禁止任何bookcase点击检测和推送激活
        if (isSelectionPhase) {
            // 【绝对保护】强制确保选择页面阶段不会触发任何推送相关状态
            currentImage = null;
            isViewerOpen = false;
            isPushActive = false;
            isDragging = true; lastX=canvasMouseX; lastY=canvasMouseY;
            return;
        }
        
        // 检查是否在冷却期内
        if (autoScrollCompleteTime > 0 && millis() - autoScrollCompleteTime < AUTO_SCROLL_COOLDOWN) {
            isDragging = true; lastX=canvasMouseX; lastY=canvasMouseY;
            return;
        }
        
        // 找到最上方的bookcase
        let topIndex = -1;
        let minY = Infinity;
        for (let i = 0; i < totalRooms; i++) {
            if (bubbleY[i] < minY) {
                minY = bubbleY[i];
                topIndex = i;
            }
        }
        
        // 只允许点击最上方的bookcase
        // 根据屏幕尺寸动态计算点击范围，确保在不同屏幕尺寸下点击范围与视觉显示匹配
        // 使用全局 screenScale，不要重新定义局部变量
        let clickRadius = bubbleSize / 1.5 * screenScale;
        
        if (topIndex !== -1) {
            let distance = dist(canvasMouseX, canvasMouseY, bubbleX[topIndex], bubbleY[topIndex]);
            
            if (distance < clickRadius) {
                // 无论从哪里来的，点击bookcase就激活推送！
                if (!isMainGameStarted) {
                    isMainGameStarted = true;
                }
                hasClickedBookcase = true;
                clickCounts[topIndex]++;
                checkAndTriggerGlitch();
                let cnTitle = folderNames[topIndex];
                let enTitle = getEnglish(cnTitle);
                
                // 先检查是否已经临时替换过
                let displayId = tempImageReplace[topIndex] !== undefined ? tempImageReplace[topIndex] : topIndex;
                let displayTitle = tempTitleReplace[topIndex] || (cnTitle + " " + enTitle);
                
                // 如果当前发生故障且未被临时替换过，则进行临时替换
                if (isGlitching && random(1) < 0.9 && tempImageReplace[topIndex] === undefined) {
                    let other = []; for(let j=0;j<totalRooms;j++)if(j!==topIndex) other.push(j);
                    let randIdx = other[floor(random(other.length))];
                    // 临时保存替换（点击新bookcase时会被清除）
                    tempImageReplace[topIndex] = randIdx;
                    tempTitleReplace[topIndex] = cnTitle + " (WRONG!) " + enTitle;
                    // 更新显示
                    displayId = randIdx;
                    displayTitle = tempTitleReplace[topIndex];
                }
                
                currentImage = correctImages[displayId];
                currentTitle = displayTitle;
                currentImageId = topIndex;
                activatePushLayer(topIndex);
            }
        }
    }
    isDragging = true; lastX=canvasMouseX; lastY=canvasMouseY;
}

    currentTitle=""; 
    currentImageId=-1; 
    isViewerOpen=false; 
    deactivatePushLayer(); 
    isTransitioning=false; 
    if(pendingFlip&&!isGlitching){ 
        isGlitching=true; 
        glitchEffectType=8; 
        glitchEndTime=pendingFlipEndTime; 
        applyCSSGlitch(8); 
    } 
}

        startScrollSound();
        let coords = transformMouseCoords(mouseX, mouseY);
        rotationVelocity+=(coords.x-lastX)*0.005; lastX=coords.x; lastY=coords.y; 
    } 
    if(currentImage && isPushActive && isDragging && !isTransitioning){ 
        // 拖拽卫星时开始播放滚动声音
        startScrollSound();
        let coords = transformMouseCoords(mouseX, mouseY);
        pushRotationVelocity+=(coords.x-lastX)*0.008; pushRotationVelocity=constrain(pushRotationVelocity,-0.3,0.3); lastX=coords.x; }
}
function mouseReleased() { isDragging=false; }
function mouseMoved() { 
    if (isSelectionPhase) return;
    if(currentImage) return; 
    hoverIndex=-1; 
    // 找到最上方的bookcase
    let topIndex = -1;
    let minY = Infinity;
    for(let i=0;i<totalRooms;i++){
        if(bubbleY[i] < minY) {
            minY = bubbleY[i];
            topIndex = i;
        }
    }
    // 只在最上方的bookcase上悬停
    let coords = transformMouseCoords(mouseX, mouseY);
    if(topIndex !== -1 && dist(coords.x,coords.y,bubbleX[topIndex],bubbleY[topIndex])<bubbleSize/1.5){ 
        hoverIndex=topIndex; 
    } 
}
function mouseWheel(e) { 
    if (isSelectionPhase) return false;
    if(!isTransitioning){ 
        // 滚轮滚动时开始播放滚动声音
        startScrollSound();
        if(currentImage && isPushActive){ pushRotationVelocity+=e.delta*0.002; pushRotationVelocity=constrain(pushRotationVelocity,-0.3,0.3); } else { rotationVelocity+=e.delta*0.001; rotationVelocity=constrain(rotationVelocity,-0.25,0.25); } 
    } 
    return false; 
}
function checkAndTriggerGlitch() { 
    // 如果正在播放视频，不触发故障效果（避免声音冲突）
    if (isVideoPlaying) return;
    if(!isGlitching && random(1)<glitchProbability) enterGlitchMode(); 
}
function enterGlitchMode() { 
    isGlitching=true; 
    let rand=random(1); 
    let duration=rand<0.8?random(300,1000):random(1000,3000); 
    glitchEndTime=millis()+duration; 
    let typeRand=random(1); 
    if(typeRand<0.8){ 
        isImmediateGlitch=true; 
        isLatentGlitch=false; 
        let visualRand=random(1); 
        if(visualRand<0.5){ 
            glitchEffectType=floor(random(1,8)); 
            applyCSSGlitch(glitchEffectType); 
        } else glitchEffectType=0; 
    } else { 
        isImmediateGlitch=false; 
        isLatentGlitch=true; 
        glitchEffectType=0; 
    } 
    // 播放故障音效
    playGlitchSound(duration);
}
function exitGlitchMode() { 
    clearCSSGlitch(); 
    isGlitching=false; 
    if(isLatentGlitch && !pendingFlip && random(1)<0.5){ 
        pendingFlip=true; 
        pendingFlipEndTime=millis()+random(300,3000); 
    } 
    isImmediateGlitch=false; 
    isLatentGlitch=false; 
    glitchEffectType=0; 
    // 停止故障音效
    stopGlitchSound();
}
function keyPressed() { 
    if(keyCode===27 && currentImage) closeImageViewer(); 
    if(key==='r'||key==='R'){ 
        clearCSSGlitch(); 
        isGlitching=false; 
        pendingFlip=false; 
        glitchEffectType=0; 
        currentRotation=0; 
        rotationVelocity=0; 
        if(currentImage) closeImageViewer(); 
        updateBubblePositions(); 
    } 
    if(key===' ' && !isGlitching){ 
        isGlitching=true; 
        glitchEndTime=millis()+1800; 
        glitchEffectType=floor(random(1,9)); 
        applyCSSGlitch(glitchEffectType); 
        isImmediateGlitch=true; 
        isLatentGlitch=false; 
        // 播放故障音效
        playGlitchSound(1800);
    } 
}
function windowResized() {

    const isPortrait = windowWidth < windowHeight;
    if (isPortrait) {

// ========== 视频播放系统 ==========

let videoSequenceEndTimer = null;

function startVideoSequence() {
    console.log('[VIDEO DEBUG] startVideoSequence CALLED!');
    
    if (isVideoPlaying) return;
    
    isVideoPlaying = true;
    isBlackScreen = false;
    
    // 完全停止所有其他声音
    stopBackgroundSound();
    stopOpeningSound();
    stopGlitchSound();
    if (audioSystem.isScrollSoundPlaying && audioSystem.scrollSound) {
        audioSystem.scrollSound.pause();
        audioSystem.scrollSound.currentTime = 0;
        audioSystem.isScrollSoundPlaying = false;
    }
    audioSystem.isScrolling = false;
    
    // 重置变量
    bookcaseToVideoMap = {};
    videoElements = [];
    videoElementsBySource = {};
    videoActiveBookcases.clear();
    
    // 取消之前的定时器
    if (videoReplaceTimer) {
        clearTimeout(videoReplaceTimer);
        videoReplaceTimer = null;
    }
    if (videoSequenceEndTimer) {
        clearTimeout(videoSequenceEndTimer);
        videoSequenceEndTimer = null;
    }
    
    // 设置主bookcase的标题为乱码
    let chaosChars = "!@#$%^&*()_+-=[]{}|;':\",./<>?`~0123456789abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZアイウエオカキクケコ";
    let chaosTitle = "";
    for (let i = 0; i < floor(random(8, 15)); i++) {
        chaosTitle += chaosChars[floor(random(chaosChars.length))];
    }
    currentTitle = chaosTitle;
    
    // 添加主bookcase到视频显示集合
    videoActiveBookcases.add(currentImageId);
    
    // 设置推送层bookcase的替换顺序
    videoReplaceOrder = [];
    for (let i = 0; i < pushItems.length; i++) {
        if (pushItems[i] !== currentImageId) {
            videoReplaceOrder.push(pushItems[i]);
        }
    }
    videoReplaceIndex = 0;
    
    // 【关键修复】只使用p5.js的createVideo加载视频，避免冲突
    for (let source of videoSourceList) {
        console.log('[VIDEO DEBUG] Creating video element for source:', source);
        
        // 只使用p5.js的createVideo
        let p5Vid = createVideo(source, function() {
            console.log('[VIDEO DEBUG] Video loaded callback for:', source);
        });
        p5Vid.hide();
        p5Vid.loop = false;
        p5Vid.elt.muted = true;
        p5Vid.elt.volume = 0;
        p5Vid.elt.playsInline = true;
        p5Vid.elt.webkitPlaysInline = true;
        p5Vid.elt.preload = 'auto';
        
        // 【关键】存入 videoElementsBySource
        videoElementsBySource[source] = p5Vid;
        videoElements.push(p5Vid);
        
        // 监听视频加载事件
        p5Vid.elt.addEventListener('loadedmetadata', function() {
            console.log('[VIDEO DEBUG] Metadata loaded for:', source, 'duration:', p5Vid.elt.duration);
        });
        
        p5Vid.elt.addEventListener('canplay', function() {
            console.log('[VIDEO DEBUG] Can play for:', source);
        });
        
        p5Vid.elt.addEventListener('error', function(e) {
            console.error('[VIDEO ERROR] Error loading:', source, e);
        });
    }
    
    // 【关键】确定主bookcase的视频源（先单独分配，避免和推送层冲突）
    let mainBookcaseSource = videoSourceList[floor(random(videoSourceList.length))];
    bookcaseToVideoMap[currentImageId] = mainBookcaseSource;
    console.log('[VIDEO DEBUG] Main bookcase source:', mainBookcaseSource);
    
    let mainVideoSegmentDuration = 0; // 记录主视频的实际播放时长
    let mainVideoStartTime = 0; // 记录主视频开始播放的时间点
    
    // 为推送层bookcase分配视频源（排除主bookcase的源，避免冲突）
    for (let bookcaseId of videoReplaceOrder) {
        let availableSources = videoSourceList.filter(s => s !== mainBookcaseSource);
        let randomSource = availableSources[floor(random(availableSources.length))];
        bookcaseToVideoMap[bookcaseId] = randomSource;
    }
    console.log('[VIDEO DEBUG] Bookcase to video mapping:', bookcaseToVideoMap);
    
    // 播放指定bookcase的视频片段
    function playVideoSegmentForBookcase(bookcaseId, isMain = false) {
        let source = bookcaseToVideoMap[bookcaseId];
        if (!source) {
            console.log('[VIDEO DEBUG] No source for bookcase:', bookcaseId);
            return;
        }
        
        let videoObj = videoElementsBySource[source];
        if (!videoObj || !videoObj.elt) {
            console.log('[VIDEO DEBUG] Video element not found for source:', source);
            return;
        }
        
        let videoEl = videoObj.elt;
        
        if (isMain) {
            console.log('[VIDEO DEBUG] Playing MAIN video segment, source:', source);
            
            // 设置静音状态
            videoEl.muted = false;
            videoEl.volume = 1.0;
            
            // 随机选择播放片段（5-10秒）
            let segmentDuration = random(5, 10);
            let videoDuration = videoEl.duration;
            
            mainVideoSegmentDuration = segmentDuration;
            
            if (videoDuration && videoDuration > segmentDuration) {
                let startTime = random(0, videoDuration - segmentDuration);
                mainVideoStartTime = startTime;
                console.log('[VIDEO DEBUG] Playing segment for MAIN bookcase:', bookcaseId, 'source:', source, 'startTime:', startTime, 'duration:', segmentDuration);
                
                videoEl.currentTime = startTime;
                // 等待seek完成后再播放
                let seekCheck = setInterval(() => {
                    if (Math.abs(videoEl.currentTime - startTime) < 0.2) {
                        clearInterval(seekCheck);
                        videoEl.play().catch(e => console.log('[VIDEO] Play error:', e));
                        
                        // 【关键】监听视频ended事件，视频播放完立即进入结局
                        videoEl.onended = function() {
                            console.log('[VIDEO DEBUG] Video ended naturally, calling endVideoSequence');
                            if (isVideoPlaying) {
                                endVideoSequence();
                            }
                        };
                        
                        // 【关键保护】同时设置主视频结束定时器，确保播放完指定时长
                        if (mainVideoEndTimer) clearTimeout(mainVideoEndTimer);
                        mainVideoEndTimer = setTimeout(() => {
                            console.log('[VIDEO DEBUG] Main video segment duration reached');
                            if (isVideoPlaying) {
                                endVideoSequence();
                            }
                        }, (segmentDuration + 0.5) * 1000);
                    }
                }, 50);
                setTimeout(() => clearInterval(seekCheck), 500);
            } else {
                // 如果无法获取时长
                videoEl.play().catch(e => console.log('[VIDEO] Play error:', e));
                
                // 【关键】也监听ended事件
                videoEl.onended = function() {
                    console.log('[VIDEO DEBUG] Video ended naturally, calling endVideoSequence');
                    if (isVideoPlaying) {
                        endVideoSequence();
                    }
                };
            }
        } else {
            console.log('[VIDEO DEBUG] Setting up non-main video for bookcase:', bookcaseId, 'source:', source);
            
            // 非主视频：设置静音，并设置一个随机的时间点，保持暂停状态
            // 因为和主视频源不同，所以不会有冲突！
            videoEl.muted = true;
            videoEl.volume = 0;
            
            let segmentDuration = random(5, 10);
            let videoDuration = videoEl.duration;
            
            if (videoDuration && videoDuration > segmentDuration) {
                let startTime = random(0, videoDuration - segmentDuration);
                videoEl.currentTime = startTime;
                // 确保视频暂停在这个位置
                if (!videoEl.paused) {
                    videoEl.pause();
                }
            }
        }
    }
    
    // 延迟一点开始播放主视频，让视频元素有时间加载
    setTimeout(() => {
        if (isVideoPlaying) {
            console.log('[VIDEO DEBUG] Playing main video for bookcase:', currentImageId);
            playVideoSegmentForBookcase(currentImageId, true);
            
            // 【关键修复】根据主视频的实际播放时长来设置结束定时器
            // 给一些额外的缓冲时间（2秒），确保视频能完整播放
            const endDelay = Math.max(mainVideoSegmentDuration * 1000 + 2000, 10000); // 最少还是保留10秒兜底
            console.log('[VIDEO DEBUG] Setting video sequence will end after', endDelay, 'ms later with segment duration:', mainVideoSegmentDuration);
            
            videoSequenceEndTimer = setTimeout(() => {
                console.log('[VIDEO DEBUG] Sequence ending...');
                endVideoSequence();
            }, endDelay);
        }
    }, 500);
    
    // 依次替换推送层bookcase
    function startNextVideoReplace() {
        if (videoReplaceIndex >= videoReplaceOrder.length) {
            console.log('[VIDEO DEBUG] All replacement videos started');
            return;
        }
        
        let replaceId = videoReplaceOrder[videoReplaceIndex];
        videoActiveBookcases.add(replaceId);
        triggerReplaceGlitch();
        
        console.log('[VIDEO DEBUG] Playing replacement video for bookcase:', replaceId);
        playVideoSegmentForBookcase(replaceId, false);
        
        videoReplaceIndex++;
        
        videoReplaceTimer = setTimeout(() => {
            startNextVideoReplace();
        }, 800);
    }
    
    // 延迟启动替换
    videoReplaceTimer = setTimeout(() => {
        startNextVideoReplace();
    }, 1500);
    
    // 开始混乱效果
    startChaosEffect();
}

function triggerReplaceGlitch() {
    replaceGlitchActive = true;
    if (replaceGlitchTimer) clearTimeout(replaceGlitchTimer);
    replaceGlitchTimer = setTimeout(() => {
        replaceGlitchActive = false;
    }, 150); // 闪烁持续150毫秒
}

function endVideoSequence() {
    // 清除所有定时器
    if (videoSequenceEndTimer) {
        clearTimeout(videoSequenceEndTimer);
        videoSequenceEndTimer = null;
    }
    if (mainVideoEndTimer) {
        clearTimeout(mainVideoEndTimer);
        mainVideoEndTimer = null;
    }
    
    stopChaosEffect();
    
    // 替换推送层定时器
    if (videoReplaceTimer) {
        clearTimeout(videoReplaceTimer);
        videoReplaceTimer = null;
    }
    
    // 保存当前状态
    if (currentImageId !== -1) {
        let lastId = clickHistory.length > 0 ? clickHistory[clickHistory.length - 1] : -1;
        if (lastId !== currentImageId) {
            clickHistory.push(currentImageId);
            sessionStorage.setItem('clickHistory', JSON.stringify(clickHistory));
        }
    }
    
    // 停止并清理所有视频元素
    for (let source in videoElementsBySource) {
        let vid = videoElementsBySource[source];
        if (vid && vid.elt) {
            try {
                vid.elt.pause();
                vid.elt.currentTime = 0;
                vid.elt.src = '';  // 清除src释放资源
                vid.elt.load();     // 重置加载状态
            } catch(e) {}
            vid.remove();
        }
    }
    
    // 清空所有相关变量
    videoElements = [];
    videoElementsBySource = {};
    fullVideoElements = [];
    videoTimers = [];
    videoActiveBookcases.clear();
    bookcaseToVideoMap = {};
    
    isVideoPlaying = false;
    isViewerOpen = false;
    isPushActive = false;
    pushItems = [];
    
    // 隐藏滚动条
    if (mainScrollBar) mainScrollBar.style.display = 'none';
    if (pushScrollBar) pushScrollBar.style.display = 'none';
    
    isEndingPhaseActive = true;
    
    // 播放背景音（使用较低音量避免突兀）
    playBackgroundAfterVideoEnded();
    if (audioSystem.backgroundSound) {
        audioSystem.backgroundSound.volume = 0.3;
        // 淡入效果
        let fadeInterval = setInterval(() => {
            if (audioSystem.backgroundSound.volume < 0.5) {
                audioSystem.backgroundSound.volume = Math.min(0.5, audioSystem.backgroundSound.volume + 0.05);
            } else {
                clearInterval(fadeInterval);
            }
        }, 100);
    }
    
    initFinalGlitch();
}

let clickHistory = [];
let clickHistoryIndex = 0;
let clickHistoryFrameCount = 0;
const CLICK_HISTORY_FRAME_DURATION = 24; // 每步24帧，放慢一倍
let isClickHistoryComplete = false;

let historyChainRelations = []; // 记录链条关系：horizontal, vertical, random
let titlePositions = []; // 存储固定的标题位置，防止频闪

function initClickHistory() {
    clickHistory = [];
    historyChainRelations = [];
    titlePositions = [];
    
    let savedHistory = sessionStorage.getItem('clickHistory');
    if (savedHistory) {
        clickHistory = JSON.parse(savedHistory);
    }
    
    for (let i = 1; i < clickHistory.length; i++) {
        let relation = analyzeChainRelation(clickHistory[i-1], clickHistory[i]);
        historyChainRelations.push(relation);
    }
    
    clickHistoryIndex = 0;
    clickHistoryFrameCount = 0;
    isClickHistoryComplete = false;
}

function analyzeChainRelation(id1, id2) {
    let title1 = folderNames[parseInt(id1)];
    let title2 = folderNames[parseInt(id2)];
    
    if (!title1 || !title2) return 'random';
    
    let recommendations = pushRules[title1];
    if (!recommendations) return 'random';
    
    let index = recommendations.indexOf(title2);
    
    if (index === -1) {
        return 'random';
    } else if (index <= 1) {
        return 'vertical';
    } else if (index <= 3) {
        return 'horizontal';
    } else {
        return 'random';
    }
}

function checkChainRelation(title1, title2) {
    let recs = pushRules[title1];
    if (!recs) return false;
    let index = recs.indexOf(title2);
    return index !== -1;
}

function isRandomRecommendation(title1, title2) {
    let recs = pushRules[title1];
    if (!recs) return true;
    let index = recs.indexOf(title2);
    return index === 4;
}

function startEndingSequence() {

    endingPhase = 0;
    endingStartTime = millis();
    
    // 初始化拖尾
    endingTitle1Trails = [];
    endingTitle2Trails = [];
    endingFinalTextTrails = [];

        title1: { x: width/2, y: height/2 - 60 * screenScale, vy: 0, ay: 0.5 * screenScale, bounceCount: 0, angle: 0, rotSpeed: random(-3, 3) },
        title2: { x: width/2, y: height/2 + 60 * screenScale, vy: 0, ay: 0.5 * screenScale, bounceCount: 0, angle: 0, rotSpeed: random(-3, 3) },
        arrow: { x: width/2, y: height/2, vy: 0, ay: 0.5 * screenScale, bounceCount: 0, angle: 0, rotSpeed: random(-2, 2) }
    };

    isEndingGlitchActive = false;
}

function initFireworks() {
    fireworks = [];
    for (let i = 0; i < 50; i++) {
        fireworks.push({
            x: random(width),
            y: random(height),
            vx: random(-3, 3) * screenScale,
            vy: random(-5, -1) * screenScale,
            size: random(3, 8) * screenScale,
            color: color(random(255), random(255), random(255)),
            alpha: 255,
            decay: random(2, 5)
        });
    }
}

function updateAndDrawFireworks() {
    noStroke();
    for (let f of fireworks) {
        f.x += f.vx;
        f.y += f.vy;
        f.vy += 0.05 * screenScale;
        f.alpha -= f.decay;
        
        if (f.alpha > 0) {
            fill(red(f.color), green(f.color), blue(f.color), f.alpha);
            ellipse(f.x, f.y, f.size);
        }
    }
}

function updateEndingSequence() {
    if (!isEndingActive) return;
    
    let elapsed = millis() - endingStartTime;
    
    if (endingPhase === 0) {
        background(0);
        if (elapsed > 1500) {
            endingPhase = 1;
            endingStartTime = millis();
        }
    } else if (endingPhase === 1) {
        background(0);
        
        fill(255);
        textSize(36 * screenScale);
        textAlign(CENTER, CENTER);
        textFont('monospace');
        
        text(displayEndingTitle1, width/2, height/2 - 60 * screenScale);
        text('↓', width/2, height/2);
        text(displayEndingTitle2, width/2, height/2 + 60 * screenScale);
        
        if (elapsed > 2000) {
            endingPhase = 2;
            endingStartTime = millis();
        }
    } else if (endingPhase === 2) {
        background(0);
        
        // 自由落体物理模拟
        let physicsEnded = true;
        ['title1', 'title2', 'arrow'].forEach(key => {
            let obj = endingPhysics[key];
            obj.vy += obj.ay; // 重力加速度
            obj.y += obj.vy;
            obj.angle += obj.rotSpeed; // 添加旋转
            
            // 检查碰撞地面
            let groundY = height - 20 * screenScale;
            if (obj.y > groundY && obj.bounceCount < 2) {
                obj.y = groundY;
                obj.vy = -obj.vy * 0.6; // 反弹，能量损失
                obj.bounceCount++;
                obj.rotSpeed *= 0.8; // 反弹时减慢旋转
            }
            
            if (obj.bounceCount < 2) {
                physicsEnded = false;
            }
        });
        
        // 绘制下落的标题和箭头
        fill(255);
        textSize(36 * screenScale);
        textAlign(CENTER, CENTER);
        textFont('monospace');
        
        // 绘制第一个标题
        push();
        translate(endingPhysics.title1.x, endingPhysics.title1.y);
        rotate(radians(endingPhysics.title1.angle));
        text(displayEndingTitle1, 0, 0);
        pop();
        
        // 绘制箭头
        push();
        translate(endingPhysics.arrow.x, endingPhysics.arrow.y);
        rotate(radians(endingPhysics.arrow.angle));
        text('↓', 0, 0);
        pop();
        
        // 绘制第二个标题
        push();
        translate(endingPhysics.title2.x, endingPhysics.title2.y);
        rotate(radians(endingPhysics.title2.angle));
        text(displayEndingTitle2, 0, 0);
        pop();
        
        if (physicsEnded) {
            endingPhase = 3;
            endingStartTime = millis();
            
            if (endingType === 1) {
                isFireworksActive = true;
                fireworksStartTime = millis();
                initFireworks();
            } else {
                isEndingGlitchActive = true;
                endingGlitchStartTime = millis();
                // 播放故障音效
                playGlitchSound(1000);
                console.log('Ending glitch started, calling playGlitchSound');
            }
        }
    } else if (endingPhase === 3) {
        background(0);
        
        // 绘制已下落的标题和箭头
        fill(255);
        textSize(36 * screenScale);
        textAlign(CENTER, CENTER);
        textFont('monospace');
        text(displayEndingTitle1, endingPhysics.title1.x, endingPhysics.title1.y);
        text('↓', endingPhysics.arrow.x, endingPhysics.arrow.y);
        text(displayEndingTitle2, endingPhysics.title2.x, endingPhysics.title2.y);
        
        if (isEndingGlitchActive) {
            let glitchElapsed = millis() - endingGlitchStartTime;
            if (glitchElapsed < 1000) {
                glitchSegmentType = floor(random(16));
                switch(glitchSegmentType) {
                    case 0: drawNoise(); break;
                    case 1: drawParticlesBW(); break;
                    case 2: drawBlocksBW(); break;
                    case 3: drawScanlines(); break;
                    case 4: drawInvert(); break;
                    case 5: drawStripesBW(); break;
                    case 6: drawSliceGlitch(); break;
                    case 7: drawWavesBW(); break;
                    case 8: drawStaticNoiseBW(); break;
                    case 9: drawWhiteBarScreen(); break;
                    case 10: drawBlackScreenGlitch(); break;
                    case 11: drawScannedLines(); break;
                    case 12: drawWhiteNoise(); break;
                    case 13: drawStripes(); break;
                    case 14: drawColorBars(); break;
                    case 15: drawRGBShift(); break;
                }
                drawGlitchOverlay();
            } else {
                isEndingGlitchActive = false;
                // 停止故障音效
                stopGlitchSound();
            }
        }
        
        if (isFireworksActive) {
            updateAndDrawFireworks();
            
            let fireworkElapsed = millis() - fireworksStartTime;
            if (fireworkElapsed > 5000) {
                isFireworksActive = false;
            }
        }
        
        let fadeElapsed = elapsed - 1000;
        if (fadeElapsed > 0) {
            endingTextOpacity = min(255, fadeElapsed * 0.5);
        }
        
        fill(255, 255, 255, endingTextOpacity);
        textSize(24); // 缩小结局文字
        textAlign(CENTER, CENTER);
        textFont('monospace');
        
        let endText = "";
        if (endingType === 1) {
            endText = "Ending: In the era of information explosion, you were never distracted by information push notifications / 在信息大爆炸的时代，信息推送从未使你分心";
        } else if (endingType === 2) {
            endText = "Ending: Cognitive Drift / 达成结局：认知漂移";
        } else if (endingType === 3) {
            endText = "Ending: Seemingly gained more information? / 好像得到了更多信息？";
        }
        text(endText, width/2, height/2 - 100);
        
        // 绘制返回按钮（完全居中）
        let btnWidth = 120;
        let btnHeight = 40;
        let btnX = width / 2 - btnWidth / 2;
        let btnY = height / 2 + 50; // 垂直居中，略微偏下
        
        // 检测鼠标悬停
        let btnHovered = isEndingActive && 
                         canvasMouseX >= btnX && canvasMouseX <= btnX + btnWidth && 
                         canvasMouseY >= btnY && canvasMouseY <= btnY + btnHeight;
        
        // 绘制按钮背景
        fill(btnHovered ? 80 : 60);
        rect(btnX, btnY, btnWidth, btnHeight, 8);
        
        // 绘制按钮文字
        fill(255);
        textSize(18);
        textAlign(CENTER, CENTER);
        text("Back / 返回", width/2, btnY + btnHeight/2);
        
        // 保存按钮位置供点击检测
        window.endingBtnX = btnX;
        window.endingBtnY = btnY;
        window.endingBtnW = btnWidth;
        window.endingBtnH = btnHeight;
    }
    
    // 更新和绘制点击生成的标题粒子
    for (let i = endingTitleParticles.length - 1; i >= 0; i--) {
        let p = endingTitleParticles[i];
        
        // 更新物理（直到粒子完全停止）
        if (abs(p.vy) > 0.1 || abs(p.vx) > 0.1) {
            p.vy += p.ay; // 重力加速度
            p.x += p.vx;
            p.y += p.vy;
            p.angle += p.rotSpeed;
            
            // 计算文字边界框（考虑旋转，但简化处理）
            let textW = p.width + 20; // 文字宽度 + 边距
            let textH = 36 * screenScale + 20; // 文字高度 + 边距
            let halfW = textW / 2;
            let halfH = textH / 2;
            
            // 屏幕边界框
            let topBoundary = 80 * screenScale; // 标题下方
            let bottomBoundary = height - 20 * screenScale;
            let leftBoundary = 20;
            let rightBoundary = width - 20;
            
            // 底部边界反弹
            if (p.y + halfH > bottomBoundary) {
                p.y = bottomBoundary - halfH;
                p.vy = -p.vy * 0.6; // 反弹并减速
                p.rotSpeed *= 0.8; // 旋转也减速
            }
            
            // 顶部边界反弹
            if (p.y - halfH < topBoundary) {
                p.y = topBoundary + halfH;
                p.vy = abs(p.vy) * 0.6; // 确保向下
                p.rotSpeed *= 0.8;
            }
            
            // 左侧边界反弹
            if (p.x - halfW < leftBoundary) {
                p.x = leftBoundary + halfW;
                p.vx = abs(p.vx) * 0.6; // 确保向右
                p.rotSpeed *= 0.8;
            }
            
            // 右侧边界反弹
            if (p.x + halfW > rightBoundary) {
                p.x = rightBoundary - halfW;
                p.vx = -abs(p.vx) * 0.6; // 确保向左
                p.rotSpeed *= 0.8;
            }
        }
        
        // 绘制标题粒子（永远不消失）
        push();
        translate(p.x, p.y);
        rotate(radians(p.angle));
        fill(255, 255, 255, p.opacity);
        textSize(36 * screenScale);
        textAlign(CENTER, CENTER);
        textFont('monospace');
        text(p.text, 0, 0);
        pop();
    }
}

// 重置游戏状态
function resetGame() {
    // 清空标题粒子
    endingTitleParticles = [];
    
    // 停止所有声音
    if (audioSystem.openingSound) {
        audioSystem.openingSound.pause();
        audioSystem.openingSound.currentTime = 0;
    }
    if (audioSystem.backgroundSound) {
        audioSystem.backgroundSound.pause();
        audioSystem.backgroundSound.currentTime = 0;
    }
    if (audioSystem.scrollSound) {
        audioSystem.scrollSound.pause();
        audioSystem.scrollSound.currentTime = 0;
    }
    // 停止故障音效（用Web Audio API）
    stopGlitchSound();
    
    audioSystem.isOpeningSoundPlaying = false;
    audioSystem.isBackgroundSoundPlaying = false;
    audioSystem.isScrollSoundPlaying = false;
    audioSystem.isGlitchSoundPlaying = false;
    audioSystem.playBackgroundAfterVideo = false;
    
    // 显示开屏canvas
