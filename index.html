function drawClickHistoryAnimation() {
    if (clickHistory.length === 0) return;
    
    let currentStep = Math.floor(clickHistoryFrameCount / CLICK_HISTORY_FRAME_DURATION);
    let displayCount = Math.min(currentStep + 1, clickHistory.length);
    
    textAlign(CENTER, CENTER);
    textFont('monospace');
    
    let positions = [];
    let currentX = 0;
    let currentY = 0;
    
    positions.push({ x: currentX, y: currentY });
    
    for (let i = 1; i < displayCount; i++) {
        let prevIndex = i - 1;
        let relation = historyChainRelations.length > prevIndex ? historyChainRelations[prevIndex] : 'random';
        
        if (relation === 'vertical') {
            currentY += 180 * screenScale; // 增加垂直距离
        } else {
            currentX += 450 * screenScale; // 增加水平距离
        }
        
        positions.push({ x: currentX, y: currentY });
    }
    
    let latestPos = positions[displayCount - 1];
    
    let offsetX = -latestPos.x;
    let offsetY = -latestPos.y;
    
    if (!window.lastOffsetX) {
        window.lastOffsetX = offsetX;
        window.lastOffsetY = offsetY;
    }
    window.lastOffsetX += (offsetX - window.lastOffsetX) * 0.1;
    window.lastOffsetY += (offsetY - window.lastOffsetY) * 0.1;
    
    let centerX = width / 2;
    let centerY = height / 2;
    
    push();
    translate(centerX + window.lastOffsetX, centerY + window.lastOffsetY);
    
    for (let i = 0; i < displayCount; i++) {
        let id = clickHistory[i];
        let cnTitle, enTitle;
        // 检查是否有临时替换的标题
        if (tempTitleReplace[id]) {
            let parts = tempTitleReplace[id].split(" ");
            cnTitle = parts[0];
            enTitle = parts.slice(-1)[0];
        } else {
            cnTitle = folderNames[id] || 'Title ' + id;
            enTitle = getEnglish(cnTitle);
        }
        let pos = positions[i];
        
        fill(255, 255, 255);
        textSize(36 * screenScale); // 放大
        textStyle(BOLD); // 加粗
        
        // 中文在上，英文在下，都放大加粗
        text(cnTitle, pos.x, pos.y - 15 * screenScale);
        textSize(28 * screenScale); // 英文稍微小一点
        text(enTitle, pos.x, pos.y + 20 * screenScale);
        
        textStyle(NORMAL); // 恢复正常样式
        
        if (i < displayCount - 1 && i < historyChainRelations.length) {
            let relation = historyChainRelations[i];
            
            fill(255, 255, 255);
            textSize(60 * screenScale);
            
            if (relation === 'horizontal') {
                text('>>>', pos.x + 225 * screenScale, pos.y); // 增加水平符号距离
            } else if (relation === 'vertical') {
                text('vvv', pos.x, pos.y + 90 * screenScale); // 增加垂直符号距离
            } else {
                text('>>>', pos.x + 225 * screenScale, pos.y);
            }
        }
    }
    
    pop();
    
    clickHistoryFrameCount++;
}

function updateClickHistoryIndex() {
    if (isClickHistoryComplete) return;
    // 这个函数不需要了，因为我们在drawClickHistoryAnimation中处理
}

function getRandomGlitchInsertFrames() {
    // 随机返回1-8帧的故障插入
    return floor(random(1, 9));
}

function isShowingGlitchFrame() {
    // 随机决定是否插入故障
    return random(1) < 0.4; // 40%概率插入故障
}

let glitchInsertCounter = 0;
let glitchInsertRemaining = 0;
let showingGlitch = false;

function initFinalGlitch() {
    isFinalGlitchActive = true;
    glitchStartTime = millis();
    glitchSegmentType = floor(random(16));
    glitchInsertCounter = 0;
    glitchInsertRemaining = floor(random(1, 9));
    showingGlitch = true;
    
    // 播放故障音效
    playGlitchSound(5000); // 较长的时长，确保能覆盖所有可能的情况
    console.log('Final glitch init, calling playGlitchSound');
    
    // 初始化点击历史动画
    initClickHistory();
    
    // 初始化粒子 - 强对比度颜色
    glitchParticles = [];
    for (let i = 0; i < 500; i++) {
        let c = contrastColors[floor(random(contrastColors.length))];
        glitchParticles.push({
            x: random(width),
            y: random(height),
            vx: random(-15, 15),
            vy: random(-25, 10),
            size: random(2, 15),
            color: color(c[0], c[1], c[2]),
            alpha: random(150, 255)
        });
    }
    
    // 初始化色块 - 强对比度颜色
    glitchBlocks = [];
    for (let i = 0; i < 80; i++) {
        let c = contrastColors[floor(random(contrastColors.length))];
        glitchBlocks.push({
            x: random(width),
            y: random(height),
            w: random(100, 600),
            h: random(5, 60),
            offsetX: random(-100, 100),
            offsetY: random(-80, 80),
            color: color(c[0], c[1], c[2]),
            alpha: random(100, 255)
        });
    }
    
    // 初始化扫描线
    glitchScanlines = [];
    for (let i = 0; i < 150; i++) {
        glitchScanlines.push({
            y: random(height),
            h: random(1, 15),
            alpha: random(30, 255)
        });
    }
}

function drawFinalGlitch() {
    if (!isFinalGlitchActive) return;
    
    let totalStepsNeeded = clickHistory.length;
    let currentStep = Math.floor(clickHistoryFrameCount / CLICK_HISTORY_FRAME_DURATION);
    let allTitlesShown = currentStep >= totalStepsNeeded;
    
    if (allTitlesShown && clickHistoryFrameCount > (totalStepsNeeded * CLICK_HISTORY_FRAME_DURATION + 60)) {
        endFinalGlitch();
        startEndingSequence();
        return;
    }
    
    background(0);
    
    drawClickHistoryAnimation();
    
    glitchInsertCounter++;
    
    // 70%的概率才会显示故障动画，30%完全不显示
    if (random(1) < 0.7) {
        if (showingGlitch) {
            // 每次显示故障时播放声音（但不要重复播放）
            if (!window.lastGlitchSoundTime || millis() - window.lastGlitchSoundTime > 500) {
                // 随机播放200-800ms的故障声音
                playGlitchSound(floor(random(200, 800)));
                window.lastGlitchSoundTime = millis();
            }
            
            if (frameCount % floor(random(1, 4)) === 0) {
                glitchSegmentType = floor(random(16));
            }
            
            switch(glitchSegmentType) {
                case 0: drawNoise(); break;
                case 1: drawParticlesBW(); break;
                case 2: drawBlocksBW(); break;
                case 3: drawScanlines(); break;
                case 4: drawInvert(); break;
                case 5: drawStripesBW(); break;
                case 6: drawSliceGlitch(); break;
                case 7: drawWavesBW(); break;
                case 8: drawStaticNoiseBW(); break;
                case 9: drawWhiteBarScreen(); break;
                case 10: drawBlackScreenGlitch(); break;
                case 11: drawScannedLines(); break;
                case 12: drawWhiteNoise(); break;
                case 13: drawStripes(); break;
                case 14: drawColorBars(); break;
                case 15: drawRGBShift(); break;
            }
            
            drawGlitchOverlay();
            
            glitchInsertRemaining--;
            
            if (glitchInsertRemaining <= 0) {
                showingGlitch = false;
                // 更长的间隔时间，增加随机性
                glitchInsertRemaining = floor(random(15, 60));
            }
        } else {
            glitchInsertRemaining--;
            
            if (glitchInsertRemaining <= 0) {
                showingGlitch = true;
                // 更短的显示时间，让故障更零散
                glitchInsertRemaining = floor(random(1, 8));
            }
        }
    }
}

function drawNoise() {
    loadPixels();
    for (let i = 0; i < pixels.length; i += 4) {
        if (random(1) < 0.3) {
            let n = random(255);
            pixels[i] = n;
            pixels[i+1] = n;
            pixels[i+2] = n;
        }
    }
    updatePixels();
}

function drawParticles() {
    for (let p of glitchParticles) {
        p.x += p.vx;
        p.y += p.vy;
        p.vy += 0.5;
        
        if (p.y > height) {
            p.y = -20;
            p.x = random(width);
            p.vx = random(-15, 15);
            p.vy = random(-25, 10);
        }
        
        fill(red(p.color), green(p.color), blue(p.color), p.alpha);
        noStroke();
        ellipse(p.x, p.y, p.size);
    }
}

function drawBlocks() {
    for (let b of glitchBlocks) {
        if (random(1) < 0.4) {
            b.offsetX = random(-150, 150);
            b.offsetY = random(-100, 100);
        }
        
        let c = b.color;
        fill(red(c), green(c), blue(c), b.alpha);
        noStroke();
        rect(b.x + b.offsetX, b.y + b.offsetY, b.w, b.h);
    }
}

function drawScanlines() {
    for (let s of glitchScanlines) {
        if (random(1) < 0.3) {
            s.y = random(height);
            s.h = random(1, 15);
        }
        fill(255, 255, 255, s.alpha);
        noStroke();
        rect(0, s.y, width, s.h);
    }
}

function drawInvert() {
    background(255);
    loadPixels();
    for (let i = 0; i < pixels.length; i += 4) {
        pixels[i] = 255 - pixels[i];
        pixels[i+1] = 255 - pixels[i+1];
        pixels[i+2] = 255 - pixels[i+2];
    }
    updatePixels();
}

function drawStripes() {
    let count = floor(random(30, 80));
    for (let i = 0; i < count; i++) {
        // 强对比度颜色组合
        let contrastColors = [
            [255, 0, 0],    // 纯红
            [0, 255, 0],    // 纯绿
            [0, 0, 255],    // 纯蓝
            [255, 255, 0],  // 黄色
            [255, 0, 255],  // 洋红
            [0, 255, 255],  // 青色
            [255, 128, 0],  // 橙色
            [128, 0, 255],  // 紫色
            [0, 255, 128],  // 青绿
            [255, 0, 128],  // 粉红
        ];
        let c = contrastColors[floor(random(contrastColors.length))];
        fill(c[0], c[1], c[2], random(150, 255));
        noStroke();
        
        if (random(1) > 0.5) {
            rect(random(width), random(height), random(50, width), random(5, 150));
        } else {
            rect(random(width), random(height), random(5, 150), random(50, height));
        }
    }
}

function drawSliceGlitch() {
    let slices = floor(random(30, 80));
    for (let i = 0; i < slices; i++) {
        let y = random(height);
        let h = random(3, 100);
        let offset = random(-200, 200);
        copy(0, y, width, h, offset, y, width, h);
    }
}

function drawDots() {
    let count = floor(random(2000, 4000));
    for (let i = 0; i < count; i++) {
        let c = color(random(255), random(255), random(255));
        fill(red(c), green(c), blue(c), random(30, 200));
        noStroke();
        ellipse(random(width), random(height), random(1, 10));
    }
}

function drawWaves() {
    noFill();
    strokeWeight(random(1, 8));
    for (let i = 0; i < 50; i++) {
        let c = color(random(255), random(255), random(255));
        stroke(red(c), green(c), blue(c), random(50, 255));
        beginShape();
        for (let x = 0; x <= width; x += 15) {
            let y = height/2 + sin(x * 0.03 + frameCount * 0.2 + i) * random(80, 300);
            vertex(x, y);
        }
        endShape();
    }
    noStroke();
}

function drawStaticNoise() {
    let count = floor(random(100, 200));
    for (let i = 0; i < count; i++) {
        let x = random(width);
        let y = random(height);
        let w = random(100, 600);
        let h = random(50, 400);
        
        loadPixels();
        let idx = (floor(y) * width + floor(x)) * 4;
        if (idx >= 0 && idx < pixels.length - 4) {
            let r = pixels[idx];
            let g = pixels[idx + 1];
            let b = pixels[idx + 2];
            fill(r, g, b);
        } else {
            fill(random(255));
        }
        noStroke();
        rect(x, y, w, h);
    }
}

function drawColorBars() {
    let barCount = floor(random(5, 15));
    let contrastColors = [
        [255, 0, 0],    // 纯红
        [0, 255, 0],    // 纯绿
        [0, 0, 255],    // 纯蓝
        [255, 255, 0],  // 黄色
        [255, 0, 255],  // 洋红
        [0, 255, 255],  // 青色
    ];
    for (let i = 0; i < barCount; i++) {
        let c = contrastColors[floor(random(contrastColors.length))];
        fill(c[0], c[1], c[2], random(150, 255));
        noStroke();
        if (random(1) > 0.5) {
            let bh = height / random(3, 10);
            rect(0, random(height - bh), width, bh);
        } else {
            let bw = width / random(3, 10);
            rect(random(width - bw), 0, bw, height);
        }
    }
}

function drawRGBShift() {
    // RGB通道分离效果 - 强对比度
    let sliceCount = floor(random(40, 100));
    for (let i = 0; i < sliceCount; i++) {
        let y = random(height);
        let h = random(2, 50);
        
        let rOffset = random(-80, 80);
        let gOffset = random(-80, 80);
        let bOffset = random(-80, 80);
        
        // 红色通道
        tint(255, 0, 0);
        copy(floor(rOffset), y, width, h, 0, y, width, h);
        
        // 绿色通道
        tint(0, 255, 0);
        copy(floor(gOffset), y, width, h, 0, y, width, h);
        
        // 蓝色通道
        tint(0, 0, 255);
        copy(floor(bOffset), y, width, h, 0, y, width, h);
        
        noTint();
    }
}

function drawChaosBlocks() {
    // 强对比度混乱色块
    let count = floor(random(30, 60));
    let contrastColors = [
        [255, 0, 0], [0, 255, 0], [0, 0, 255],
        [255, 255, 0], [255, 0, 255], [0, 255, 255],
        [255, 128, 0], [128, 0, 255],
    ];
    for (let i = 0; i < count; i++) {
        let x = random(width);
        let y = random(height);
        let w = random(100, 500);
        let h = random(50, 400);
        
        let c = contrastColors[floor(random(contrastColors.length))];
        fill(c[0], c[1], c[2], random(100, 200));
        stroke(255, 255, 255, random(100, 200));
        strokeWeight(random(1, 5));
        rect(x, y, w, h);
    }
    noStroke();
}

function drawRainNoise() {
    // 黑白线条噪声
    strokeWeight(random(1, 3));
    let count = floor(random(500, 1500));
    for (let i = 0; i < count; i++) {
        let x = random(width);
        let y1 = random(height);
        let y2 = y1 + random(10, 100);
        let gray = floor(random(255));
        stroke(gray, gray, gray, random(50, 200));
        line(x, y1, x, y2);
    }
    noStroke();
}

function drawParticlesBW() {
    for (let p of glitchParticles) {
        p.x += p.vx;
        p.y += p.vy;
        p.vy += 0.5;
        
        if (p.y > height) {
            p.y = -20;
            p.x = random(width);
            p.vx = random(-15, 15);
            p.vy = random(-25, 10);
        }
        
        let gray = floor(random(255));
        fill(gray, gray, gray, p.alpha);
        noStroke();
        ellipse(p.x, p.y, p.size);
    }
}

function drawBlocksBW() {
    for (let b of glitchBlocks) {
        if (random(1) < 0.4) {
            b.offsetX = random(-150, 150);
            b.offsetY = random(-100, 100);
        }
        
        let gray = random(255);
        fill(gray, gray, gray, b.alpha);
        noStroke();
        rect(b.x + b.offsetX, b.y + b.offsetY, b.w, b.h);
    }
}

function drawStripesBW() {
    let count = floor(random(30, 80));
    for (let i = 0; i < count; i++) {
        let gray = floor(random(255));
        fill(gray, gray, gray, random(100, 255));
        noStroke();
        
        if (random(1) > 0.5) {
            rect(random(width), random(height), random(50, width), random(5, 150));
        } else {
            rect(random(width), random(height), random(5, 150), random(50, height));
        }
    }
}

function drawWavesBW() {
    noFill();
    strokeWeight(random(1, 8));
    for (let i = 0; i < 50; i++) {
        let gray = floor(random(255));
        stroke(gray, gray, gray, random(50, 255));
        beginShape();
        for (let x = 0; x <= width; x += 15) {
            let y = height/2 + sin(x * 0.03 + frameCount * 0.2 + i) * random(80, 300);
            vertex(x, y);
        }
        endShape();
    }
    noStroke();
}

function drawStaticNoiseBW() {
    let count = floor(random(100, 200));
    for (let i = 0; i < count; i++) {
        let x = random(width);
        let y = random(height);
        let w = random(100, 600);
        let h = random(50, 400);
        
        let gray = floor(random(255));
        fill(gray, gray, gray);
        noStroke();
        rect(x, y, w, h);
    }
}

function drawWhiteBarScreen() {
    // 全屏白屏带黑条
    background(255);
    let barCount = floor(random(20, 60));
    for (let i = 0; i < barCount; i++) {
        fill(0, random(100, 255));
        noStroke();
        rect(random(width), random(height), random(50, 300), random(3, 30));
    }
}

function drawBlackScreenGlitch() {
    // 黑屏带白条
    background(0);
    let barCount = floor(random(20, 60));
    for (let i = 0; i < barCount; i++) {
        fill(255, random(100, 255));
        noStroke();
        rect(random(width), random(height), random(50, 300), random(3, 30));
    }
}

function drawScannedLines() {
    // 扫描线效果
    for (let y = 0; y < height; y += 3) {
        let offset = (frameCount + y * 0.1) % width;
        if (random(1) < 0.3) {
            stroke(255, random(50, 150));
            strokeWeight(1);
            line(0, y, width, y);
        }
    }
    noStroke();
}

function drawWhiteNoise() {
    // 纯白噪音
    loadPixels();
    for (let i = 0; i < pixels.length; i += 4) {
        if (random(1) < 0.5) {
            let n = random(255);
            pixels[i] = n;
            pixels[i+1] = n;
            pixels[i+2] = n;
        }
    }
    updatePixels();
}

function drawFinalMess() {
    // 混合多种黑白效果
    background(0);
    drawBlocks();
    drawScanlines();
    drawStripesBW();
    // 添加更多黑白元素
    for (let i = 0; i < 50; i++) {
        fill(random(255));
        noStroke();
        rect(random(width), random(height), random(50, 400), random(3, 30));
    }
}

function drawGlitchOverlay() {
    // 叠加随机故障小效果
    let effectCount = floor(random(15, 40));
    for (let i = 0; i < effectCount; i++) {
        let type = floor(random(8));
        switch(type) {
            case 0:
                // 强对比度随机色块条纹
                let contrastColors0 = [
                    [255, 0, 0], [0, 255, 0], [0, 0, 255],
                    [255, 255, 0], [255, 0, 255], [0, 255, 255],
                ];
                let c0 = contrastColors0[floor(random(contrastColors0.length))];
                fill(c0[0], c0[1], c0[2], random(150, 255));
                noStroke();
                rect(random(width), random(height), random(100, width), random(5, 50));
                break;
            case 1:
                // 断裂线条
                stroke(255, random(100, 255));
                strokeWeight(random(1, 5));
                let x1 = random(width);
                let y1 = random(height);
                let x2 = x1 + random(-200, 200);
                let y2 = y1 + random(-150, 150);
                line(x1, y1, x2, y2);
                break;
            case 2:
                // 随机黑白矩形
                fill(random(255));
                noStroke();
                rect(random(width), random(height), random(50, 300), random(3, 50));
                break;
            case 3:
                // 画面切片错位
                let gy = random(height);
                copy(0, gy, width, random(5, 100), random(-150, 150), gy, width, random(5, 100));
                break;
            case 4:
                // 垂直切片位移
                let gx = random(width);
                let gw = random(20, 150);
                copy(gx, 0, gw, height, random(-100, 100), 0, gw, height);
                break;
            case 5:
                // 噪点矩形块
                loadPixels();
                let bx = floor(random(width));
                let by = floor(random(height));
                let bw = floor(random(100, 400));
                let bh = floor(random(50, 300));
                for (let py = by; py < min(by + bh, height); py++) {
                    for (let px = bx; px < min(bx + bw, width); px++) {
                        let idx = (py * width + px) * 4;
                        if (idx >= 0 && idx < pixels.length - 4) {
                            let n = random(255);
                            pixels[idx] = n;
                            pixels[idx + 1] = n;
                            pixels[idx + 2] = n;
                        }
                    }
                }
                updatePixels();
                break;
            case 6:
                // 强对比度彩色水平条纹闪烁
                let contrastColors6 = [
                    [255, 0, 0], [0, 255, 0], [0, 0, 255],
                    [255, 255, 0], [255, 0, 255], [0, 255, 255],
                ];
                let c6 = contrastColors6[floor(random(contrastColors6.length))];
                fill(c6[0], c6[1], c6[2], random(150, 255));
                noStroke();
                rect(0, random(height), width, random(3, 30));
                break;
            case 7:
                // RGB分离小块
                let rx = random(width);
                let ry = random(height);
                let rw = random(50, 200);
                let rh = random(20, 100);
                tint(255, 0, 0, 100);
                rect(rx - 5, ry, rw, rh);
                tint(0, 255, 0, 100);
                rect(rx + 5, ry, rw, rh);
                tint(0, 0, 255, 100);
                rect(rx, ry, rw, rh);
                noTint();
                break;
        }
    }
    noStroke();
    noFill();
    noTint();
}

function endFinalGlitch() {
    isFinalGlitchActive = false;
    glitchParticles = [];
    glitchBlocks = [];
    glitchScanlines = [];
    glitchSegmentType = 0;
    
    // 停止故障音效
    stopGlitchSound();
}

function startChaosEffect() {
    chaosWords = [];
    let words = ["chaos", "path", "choice"];
    
    for (let i = 0; i < 120; i++) {
        chaosWords.push({
            x: random(width),
            y: random(height),
            word: words[floor(random(words.length))],
            size: random(18, 52),
            alpha: random(120, 255),
            rotation: random(-PI/4, PI/4)
        });
    }
    
    if (chaosUpdateTimer) clearInterval(chaosUpdateTimer);
    chaosUpdateTimer = setInterval(() => {
        for (let w of chaosWords) {
            w.word = ["chaos", "path", "choice"][floor(random(3))];
            w.x = random(width);
            w.y = random(height);
            w.rotation = random(-PI/4, PI/4);
            w.alpha = random(120, 255);
            w.size = random(18, 52);
        }
    }, 40);
}

function stopChaosEffect() {
    if (chaosUpdateTimer) {
        clearInterval(chaosUpdateTimer);
        chaosUpdateTimer = null;
    }
    chaosWords = [];
}

function drawChaosEffect() {
    if (!isVideoPlaying || isBlackScreen) return;
    if (chaosWords.length === 0) return;
    
    for (let w of chaosWords) {
        push();
        translate(w.x, w.y);
        rotate(w.rotation);
        fill(255, 255, 255, w.alpha);
        textSize(w.size);
        textAlign(CENTER, CENTER);
        text(w.word, 0, 0);
        pop();
    }
    textAlign(CENTER, CENTER);
}

// 页面卸载时清理所有视频资源
window.addEventListener('beforeunload', function() {
    for (let source in videoElementsBySource) {
        let vid = videoElementsBySource[source];
        if (vid && vid.elt) {
            vid.elt.pause();
            vid.elt.src = '';
        }
    }
    if (videoSequenceEndTimer) clearTimeout(videoSequenceEndTimer);
    if (videoReplaceTimer) clearTimeout(videoReplaceTimer);
});

</script>
</body>
</html>
